<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center',
               sidebarKey='cafe'">
<body>

<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <div class="write-page">

        <!-- 글쓰기 카드 -->
        <div class="write-card">

            <div class="write-header">게시글 수정</div>

            <form name="DirForm"
                  id="DirForm"
                  th:action="@{/noticeBoard2/updateProc}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <input type="hidden" name="id" th:value="${noticeBoard2.id}">

                <!-- 제목 -->
                <div class="write-group">
                    <label class="write-label">제목</label>
                    <input type="text"
                           name="subject"
                           class="write-title-input"
                           th:value="${noticeBoard2.subject}">
                </div>

                <!-- 내용 -->
                <div class="write-group">
                    <label class="write-label">내용</label>
                    <div class="write-editor-wrap">
                    <textarea id="content"
                              name="content" th:utext="${noticeBoard2.content}"></textarea>
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="write-action-bar">
                    <button type="button"
                            class="write-btn"
                            onclick="history.back();">
                        취소
                    </button>
                    <button type="button"
                            class="write-btn primary"
                            onclick="update();">
                        수정
                    </button>
                </div>
            </form>

        </div>
    </div>

    <script>
        function update() {
            if (document.DirForm.subject.value.trim() === '') {
                alert('제목을 입력해주세요');
                document.DirForm.subject.focus();
                return;
            }
            if (document.DirForm.content.value.trim() === '') {
                alert('내용을 입력해주세요');
                document.DirForm.content.focus();
                return;
            }
            if (confirm('수정하시겠습니까?')) {
                document.getElementById('DirForm').submit();
            }
        }
    </script>

    <script>
        $(document).ready(function() {
            $("#content").summernote({
                height: 300,
                lang: 'ko-KR'
            });
       });
    </script>

</div>
</body>
</html>
