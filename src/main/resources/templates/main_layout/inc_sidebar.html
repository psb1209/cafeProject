<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="inc_sidebar" style="background-color: white;">
<!--     class="sb-sidenav accordion sb-sidenav-light"
     id="sidenavAccordion"-->


<style>
    /* ===============================
       사이드바 전체
    ================================ */
    #sidenavAccordion {
        width: 220px;
        background-color: #fff;
        border-right: 1px solid #e5e5e5;
        font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic",
                     "Apple SD Gothic Neo", Arial, sans-serif;
    }

    /* 메뉴 래퍼 */
    .sb-sidenav-menu .nav {
        display: flex;
        flex-direction: column;
        padding: 12px 0;
    }

    /* ===============================
       공통 메뉴 링크
    ================================ */
    .sb-sidenav-menu .nav-link {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;

        padding: 10px 18px;
        margin: 2px 8px;

        font-size: 14px;
        color: #333;
        text-decoration: none;

        border-radius: 6px;
        transition: background-color 0.15s ease, color 0.15s ease;
    }

    /* 이모지 / 아이콘 */
    .sb-sidenav-menu .nav-emoji {
        font-size: 16px;
        width: 18px;
        text-align: center;
        color: inherit;
    }

    /* ===============================
       Hover
    ================================ */
    .sb-sidenav-menu .nav-link:hover {
        background-color: #f2f8ff;
        color: #1e6fd9;
    }

    /* ===============================
       Active (선택됨)
    ================================ */
    .sb-sidenav-menu .nav-link.active {
        background: linear-gradient(
            90deg,
            #eaf4ff 0%,
            #d6eaff 100%
        );
        color: #1e6fd9;
        font-weight: 600;
    }

    /* 왼쪽 포인트 바 */
    .sb-sidenav-menu .nav-link.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 20%;
        width: 3px;
        height: 60%;
        background-color: #4aa8ff;
        border-radius: 2px;
    }

    /* ===============================
       구분선
    ================================ */
    .sidenav-divider {
        height: 1px;
        background-color: #e5e5e5;
        margin: 12px 0;
    }

    /* ===============================
       섹션 제목
    ================================ */
    .sidenav-section-title {
        font-size: 12px;
        color: #888;
        padding: 8px 18px;
        font-weight: 600;
    }

    /* ===============================
       섹션 링크 (주제별 / 지역별 등)
    ================================ */
    .sb-sidenav-menu-heading {
        padding: 6px 18px;
    }

    .sb-sidenav-menu-heading .nav-link {
        padding: 6px 0;
        margin: 0;

        font-size: 13px;
        font-weight: 500;
        color: #666;
        background: none;
    }

    /* 섹션 hover */
    .sb-sidenav-menu-heading .nav-link:hover {
        background: none;
        text-decoration: underline;
        color: #1e6fd9;
    }

</style>

    <div class="sb-sidenav-menu">
        <div class="nav" style="border-right: 1px solid #666;">
            <a class="nav-link active" th:href="@{/}">
                <span class="nav-emoji">🏠</span>
                카페 홈
            </a>
            <a class="nav-link" th:href="@{/}">
                <span class="nav-emoji">👥</span>
                이웃
            </a>
            <a class="nav-link" th:href="@{/}">
                <span class="nav-emoji">⭐</span>
                구독
            </a>
            <a class="nav-link" th:href="@{/}">
                <span class="nav-emoji">🔔</span>
                내 소식
            </a>

            <div class="sidenav-section-title">카페 탐색</div>

            <a class="nav-link sub" href="imsi1/imsi1">
                <span class="nav-emoji">📂</span>
                주제별 카페
            </a>

            <a class="nav-link sub" href="imsi2/imsi2">
                <span class="nav-emoji">📍</span>
                지역별 카페
            </a>

            <a class="nav-link sub" href="imsi4/imsi4">
                <span class="nav-emoji">👑</span>
                대표 카페
            </a>

            <a class="nav-link sub" href="imsi5/imsi5">
                <span class="nav-emoji">📈</span>
                카페 랭킹
            </a>
        </div>
    </div>
</nav>
</body>
</html>
