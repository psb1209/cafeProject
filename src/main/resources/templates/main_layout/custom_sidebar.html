<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav class="sb-sidenav-menu"
     th:fragment="custom_sidebar"
     th:if="${cafe != null
          and cafe.code != null
          and !#strings.isEmpty(cafe.code)}">
    <div class="nav">

        <div class="sidenav-section-title">메인</div>

        <!-- 카페 홈 -->
        <a class="nav-link"
           th:classappend="${activeMenu == 'main'} ? ' active'"
           th:href="@{|/cafe/${cafe.code}|}">
            <span class="nav-emoji">🏠</span>카페 홈
        </a>

        <div class="sidenav-section-title">공지 · 운영</div>

        <!-- 공지 -->
        <a class="nav-link"
           th:classappend="${activeMenu == 'noticeBoard'} ? ' active'"
           th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='noticeBoard')}">
            <span class="nav-emoji">📢</span>공지사항
        </a>

        <!-- 운영게시판 -->
        <a class="nav-link"
           th:classappend="${activeMenu == 'operationBoard'} ? ' active'"
           sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_MANAGER')"
           th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='operationBoard')}">
            <span class="nav-emoji">📋</span>운영게시판
        </a>

        <div class="sidenav-section-title">커뮤니티</div>

        <!-- 자유게시판 -->
        <a class="nav-link"
           th:classappend="${activeMenu == 'communityBoard'} ? ' active'"
           th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='communityBoard')}">
            <span class="nav-emoji">🧩</span>자유게시판
        </a>

        <!-- 정보게시판 -->
        <a class="nav-link"
           th:classappend="${activeMenu == 'informationBoard'} ? ' active'"
           th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='informationBoard')}">
            <span class="nav-emoji">🔍</span>정보게시판
        </a>

        <div class="sidenav-section-title">게시판</div>

        <!-- 게시판 목록 -->
        <a class="nav-link"
           th:classappend="${activeMenu == 'all'} ? ' active'"
           th:href="@{/cafe/{cafeCode}/board(cafeCode=${cafe.code})}">
            <span class="nav-emoji">📄</span>게시판 목록
        </a>

        <div class="sidenav-section-title">카페 안내</div>

        <!-- 소개 -->
        <a class="nav-link"
           th:classappend="${activeMenu == 'about'} ? ' active'"
           th:href="@{/healthCafe/healthCafeIntroduction}">
            <span class="nav-emoji">ℹ️</span>카페 소개
        </a>

        <div class="sidenav-section-title"
             sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_MANAGER')">관리자 기능</div>

        <a class="nav-link"
           sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_MANAGER')"
           th:classappend="${activeMenu == 'boardManagement'} ? ' active'"
           th:href="@{/boardManagement/list(c=${cafe.code})}">
            <span class="nav-emoji">🛠️</span>게시판 관리
        </a>

        <a class="nav-link"
           sec:authorize="hasAnyAuthority('ROLE_ADMIN','ROLE_MANAGER')"
           th:if="${board != null and board.code != null and !#strings.isEmpty(board.code)}"
           th:classappend="${activeMenu == 'trash'} ? ' active'"
           th:href="@{/cafe/{cafeCode}/post/trashList(cafeCode=${cafe.code}, b=${board.code})}">
            <span class="nav-emoji">🗑️</span>삭제된 게시글
        </a>

    </div>
</nav>
</body>
</html>
