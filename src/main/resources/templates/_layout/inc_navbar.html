<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="inc_navbar" class="navbar navbar-expand-lg navbar-light" id="mainNav">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand" th:href="@{/}">Cafe</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive" aria-controls="navbarResponsive"
                aria-expanded="false" aria-label="Toggle navigation">
            Menu
            <i class="fas fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto py-4 py-lg-0">
                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/}">Home</a></li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/member/login}">Login</a></li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/member/create}">Join</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" href="#" onclick="logout(); return false;">Logout</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated() and !hasAnyRole('MANAGER','ADMIN')">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/member/view}">My Page</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('MANAGER','ADMIN')">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/member/list}">User List</a></li>
                <li class="nav-item">
                    <a class="nav-link px-lg-3 py-3 py-lg-4" th:href="@{/contact}">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
