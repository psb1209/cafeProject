<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(board?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${board.imgName}|},
               headerPosition='center center'">

<body>
<h1 layout:fragment="pageTitle" th:text="${board?.name} ?: 'My Cafe'">My Cafe</h1>
<span layout:fragment="pageSubTitle" th:text="${board?.description} ?: 'first page'">first page</span>

<div layout:fragment="content" class="container mt-3">
    <!-- 본문 내용 시작 -->

    <form method="post" th:action="@{/post/createProc}" th:object="${data}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="boardId"   th:value="${board?.id}"/>
        <input type="hidden" name="boardCode" th:value="${board?.code}"/>
        <input type="hidden" name="boardName" th:value="${board?.name}"/>

        <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
            입력값을 다시 확인해주세요.
        </div>

        <!-- 제목 -->
        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input id="title"
                   type="text"
                   class="form-control"
                   th:field="*{title}"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                   placeholder="제목을 입력하세요">
            <div class="invalid-feedback" th:errors="*{title}">제목 에러</div>
        </div>

        <!-- 내용 -->
        <div class="mb-3">
            <label for="content" class="form-label">내용</label>
            <textarea id="content"
                      class="form-control"
                      rows="12"
                      th:field="*{content}"
                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"
                      placeholder="내용을 입력하세요"></textarea>
            <div class="invalid-feedback" th:errors="*{content}">내용 에러</div>
        </div>

        <!-- 공지 -->
        <div class="form-check mb-4">
            <input class="form-check-input"
                   type="checkbox"
                   id="notice"
                   th:field="*{notice}">
            <label class="form-check-label" for="notice">
                공지로 등록
            </label>
        </div>

        <!-- 버튼 -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">등록</button>

            <a class="btn btn-outline-secondary"
               th:href="@{/post/list(b=${board?.code})}">
                목록으로
            </a>
        </div>
    </form>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
