<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(cafe?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${cafe.imgName}|},
               headerPosition='center center'">

<body>
<h1 layout:fragment="pageTitle"
    th:text="${board?.name} ?: 'My Cafe'"
    th:onclick="${!#strings.isEmpty(cafeCode)}
                ? |location.href='@{/cafe/{cafeCode}(cafeCode=${cafeCode})}'|
                : (cafe != null && !#strings.isEmpty(cafe.code))
                    ? |location.href='@{/cafe/{cafeCode}(cafeCode=${cafe.code})}'|
                    : |location.href='/'|"
    style="cursor: pointer;">My Cafe</h1>

<span layout:fragment="pageSubTitle"
      th:with="desc=${board?.description == null ? null : board.description.trim().replace('\r','')}"
      th:text="${#strings.isEmpty(desc) ? 'first page' : desc.split('\n')[0]}">
    first page
</span>


<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <div class="write-page">
        <div class="write-card">
            <div class="write-header">글 쓰기</div>

            <form id="PostForm" name="PostForm" method="post"
                  th:action="@{/cafe/{cafeCode}/post/createProc(cafeCode=${cafe?.code}, b=${board?.code})}"
                  th:object="${data}">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="boardId"   th:value="${board?.id}"/>
                <input type="hidden" name="boardCode" th:value="${board?.code}"/>
                <input type="hidden" name="boardName" th:value="${board?.name}"/>

                <!-- 글로벌 에러 -->
                <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
                    <div th:each="e : ${#fields.globalErrors()}" th:text="${e}">에러</div>
                </div>

                <!-- 제목 -->
                <div class="write-group">
                    <label class="write-label" for="title">제목</label>
                    <input id="title"
                           type="text"
                           class="write-title-input"
                           th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? ' is-invalid' : ''"
                           placeholder="제목을 입력하세요">
                    <div class="invalid-feedback" th:errors="*{title}">제목 에러</div>
                </div>

                <!-- 공지 -->
                <div class="write-group" sec:authorize="hasRole('ADMIN')">
                    <label class="write-label" for="notice">
                        <input id="notice" type="checkbox" th:field="*{notice}">
                        공지로 등록
                    </label>
                </div>

                <!-- 내용 -->
                <div class="write-group">
                    <label class="write-label" for="content">내용</label>
                    <div class="write-editor-wrap">
                        <textarea id="content"
                                  th:field="*{content}"
                                  th:classappend="${#fields.hasErrors('content')} ? ' is-invalid' : ''"></textarea>
                    </div>
                    <!-- Summernote로 textarea가 감춰질 수 있어, 에러는 별도 표시 -->
                    <div class="text-danger small mt-1"
                         th:if="${#fields.hasErrors('content')}"
                         th:errors="*{content}">내용 에러</div>
                </div>

                <!-- 버튼 -->
                <div class="write-action-bar">
                    <button type="button" class="write-btn" onclick="history.back();">취소</button>
                    <button type="button" class="write-btn primary" onclick="save();">등록</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= JS ================= -->
    <script>
        function save() {
            const titleEl = document.getElementById('title');

            if (!titleEl.value || titleEl.value.trim() === '') {
                alert('제목을 입력해주세요');
                titleEl.focus();
                return;
            }

            if ($('#content').summernote('isEmpty')) {
                alert('내용을 입력해주세요');
                $('#content').focus();
                return;
            }

            if (confirm('등록하시겠습니까?')) {
                document.getElementById('PostForm').submit();
            }
        }

        $(document).ready(function () {

            // CSRF META 태그에서 값 읽기 (레이아웃에 meta가 있을 때)
            const header = $("meta[name='_csrf_header']").attr("content");
            const token  = $("meta[name='_csrf']").attr("content");

            // 모든 AJAX 요청마다 CSRF 자동 추가
            if (header && token) {
                $.ajaxSetup({
                    beforeSend: function(xhr) {
                        xhr.setRequestHeader(header, token);
                    }
                });
            }

            $("#content").summernote({
                height: 300,
                lang: 'ko-KR',
                placeholder: '내용을 입력하세요',
                toolbar: [
                    ['font', ['bold', 'italic', 'underline']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['insert', ['link', 'picture']]
                ],
                callbacks: {
                    onImageUpload: function (files) {
                        uploadSummernoteImageFile(files[0], this);
                    }
                }
            });

            // placeholder hide/show (2번째 파일과 동일한 UX)
            $('#content').on('summernote.focus', function() {
                $(this).siblings('.note-editor').find('.note-placeholder').hide();
            });

            $('#content').on('summernote.blur', function() {
                if ($(this).summernote('isEmpty')) {
                    $(this).siblings('.note-editor').find('.note-placeholder').show();
                }
            });
        });

        function uploadSummernoteImageFile(file, editor) {
            let data = new FormData();
            data.append("file", file);

            $.ajax({
                url: "/post/uploadImage",
                type: "POST",
                enctype: 'multipart/form-data',
                data: data,
                processData: false,
                contentType: false,
                success: function (response) {
                    $(editor).summernote('insertImage', response.url);
                },
                error: function(xhr) {
                    console.log("status:", xhr.status);
                    console.log("response:", xhr.responseText);
                    alert("이미지 업로드 실패");
                }
            });
        }
    </script>

</div>

</body>
</html>
