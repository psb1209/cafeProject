<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(cafe?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${cafe.imgName}|},
               headerPosition='center center',
               sidebarKey='custom'">
<body>

<h1 layout:fragment="pageTitle">My Cafe</h1>
<span layout:fragment="pageSubTitle">first page</span>

<div layout:fragment="content">
    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <!-- ================= 본문 ================= -->
    <div class="page-container">

        <!-- 게시글 상세 -->
        <div class="cafe-article-wrap">

            <!-- 제목/메타 -->
            <div class="cafe-article-header">
                <h1 class="cafe-article-title" th:text="${data.title}">제목</h1>

                <div class="cafe-article-meta">
                    <span th:text="${data.username} ?: '알 수 없음'">작성자</span>

                    <span th:if="${data.createDate != null}"
                          th:text="${#dates.format(data.createDate, 'yyyy.MM.dd')}">1111.11.11</span>

                    <span th:if="${viewCnt != null}">
                        조회 <b th:text="${viewCnt}">0</b>
                    </span>

                    <span th:if="${likeCnt != null}">
                        좋아요 <b th:text="${likeCnt}">0</b>
                    </span>

                    <!-- 글 링크 복사 -->
                    <span th:if="${isTrash != true}" style="margin-left: auto;">
                        <a href="#" class="comment-link-btn" onclick="copyPostLink(event)">링크 복사</a>
                    </span>
                </div>
            </div>

            <!-- 본문 -->
            <div class="cafe-article-content" th:utext="${data.content}">
                본문
            </div>

            <!-- 버튼 -->
            <div class="cafe-article-actions">
                <a class="cafe-action-btn"
                   th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe?.code}, b=${board?.code})}">
                    목록
                </a>

                <a class="cafe-action-btn"
                   th:if="${canEdit}"
                   th:href="@{|/cafe/${cafe?.code}/post/update/${data.id}?b=${data.boardCode}|}">
                    수정
                </a>

                <form th:if="${canEdit}"
                      th:action="@{|/cafe/${cafe?.code}/post/deleteProc/${data.id}?b=${data.boardCode}|}"
                      method="post"
                      onsubmit="return confirm('삭제된 글은 복구할 수 없습니다. 삭제하시겠습니까?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="cafe-action-btn danger">삭제</button>
                </form>
            </div>

            <!--========================= 좋아요 ============================-->
            <form class="like-form"
                  th:if="${isTrash != true}"
                  action="/like/createProc"
                  method="post"
                  sec:authorize="isAuthenticated()">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <input type="hidden" name="postId" th:value="${data.id}">
                <input type="hidden" name="cafeCode" th:value="${cafe.code}">
                <input type="hidden" name="boardCode" th:value="${board.code}">

                <button type="submit" class="like-btn" th:classappend="${isLike} ? ' active' : ''">
                    <span class="like-icon" th:if="${!isLike}">🤍</span>
                    <span class="like-icon" th:if="${isLike}">❤️</span>
                    <span class="like-text">좋아요</span>
                </button>
            </form>

            <div class="like-form"
                 th:if="${isTrash != true}"
                 sec:authorize="isAnonymous()">
                <button type="button" class="like-btn" onclick="noLoginLikeButton();">
                    <span class="like-icon">🤍</span>
                    <span class="like-text">좋아요</span>
                </button>
            </div>

                        <!-- 댓글 -->
            <div class="cafe-comment-section">

                <div class="cafe-comment-title">
                    댓글 <span th:text="${commentList.totalElements}">0</span>
                </div>

                <!-- 댓글 작성 -->
                <div sec:authorize="isAuthenticated()">
                    <form name="commentForm"
                          th:attr="data-create-action=@{/cafe/{cafeCode}/postComment/createProc(cafeCode=${cafe.code}, b=${data.boardCode})},
                                   data-update-action=@{/cafe/{cafeCode}/postComment/updateProc(cafeCode=${cafe.code}, b=${data.boardCode})}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="postId" th:value="${data.id}"/>
                        <input type="hidden" name="postCommentId"
                               th:if="${postCommentUpdate != null}"
                               th:value="${postCommentUpdate.id}">

                        <div class="cafe-comment-write" th:if="${postCommentUpdate == null}">
                            <textarea name="content"
                                      class="cafe-comment-textarea"
                                      placeholder="댓글을 입력하세요"></textarea>

                            <div class="cafe-comment-btns">
                                <button type="button" class="cafe-comment-btn"
                                        onclick="commentSave();">등록</button>
                            </div>
                        </div>

                        <div class="cafe-comment-write" th:if="${postCommentUpdate != null}">
                            <textarea name="content"
                                      class="cafe-comment-textarea"
                                      th:text="${postCommentUpdate.content}"
                                      placeholder="댓글을 입력하세요"></textarea>

                            <div class="cafe-comment-btns">
                                <button type="button" class="cafe-comment-btn cancel"
                                        th:onclick="|location.href='@{/cafe/{cafeCode}/post/view/{id}(cafeCode=${cafe.code}, id=${data.id}, b=${data.boardCode})}'|">
                                    취소
                                </button>
                                <button type="button" class="cafe-comment-btn"
                                        onclick="commentUpdate();">수정</button>
                            </div>
                        </div>
                    </form>
                </div>

                <div sec:authorize="isAnonymous()" class="text-muted">
                    댓글을 작성하려면 로그인해주세요.
                </div>

                <!-- 댓글 목록 -->
                <div class="cafe-comment-list">
                    <div class="cafe-comment-item"
                         th:each="comment : ${commentList.content}"
                         th:style="'padding-left:' + (${comment.step} * 30) + 'px'">

                        <!-- 댓글 헤더 -->
                        <div class="comment-header">
                            <span>
                                <span class="comment-writer" th:text="${comment.member?.username ?: '-'}"></span>
                                <span th:switch="${(comment.member?.role?.name() == 'ADMIN' or comment.member?.role?.name() == 'MANAGER') ? 'STAFF' : (comment.member?.grade?.name() ?: 'UNKNOWN')}">
                                    <span th:case="'STAFF'">운영진👑</span>
                                    <span th:case="'USER'">일반🥉</span>
                                    <span th:case="'REGULAR'">성실🥈</span>
                                    <span th:case="'BEST'">우수🥇</span>
                                    <span th:case="'SPECIAL'">최우수🏆</span>
                                    <span th:case="'UNKNOWN'">알 수 없음</span>
                                </span>
                            </span>

                            <div class="comment-actions" sec:authorize="isAuthenticated()">
                                <button type="button"
                                        class="comment-link-btn"
                                        th:onclick="|toggleReplyForm(${comment.id})|">답글</button>

                                <form th:action="@{/cafe/{cafeCode}/postComment/update(cafeCode=${cafe.code}, b=${data.boardCode})}"
                                      method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="postId" th:value="${data.id}">
                                    <input type="hidden" name="postCommentId" th:value="${comment.id}">
                                    <button type="submit" class="comment-link-btn">수정</button>
                                </form>

                                <form th:action="@{/cafe/{cafeCode}/postComment/deleteProc(cafeCode=${cafe.code}, b=${data.boardCode})}"
                                      method="post"
                                      onsubmit="return confirm('삭제하시겠습니까?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <input type="hidden" name="postId" th:value="${data.id}">
                                    <input type="hidden" name="postCommentId" th:value="${comment.id}">
                                    <button type="submit" class="comment-link-btn danger">삭제</button>
                                </form>
                            </div>
                        </div>

                        <!-- 댓글 내용 -->
                        <div class="comment-content"
                             th:text="${comment.content}"></div>

                        <div class="comment-meta">
                            <span class="comment-date"
                                  th:text="${#dates.format(comment.createDate,'MM.dd HH:mm')}"></span>
                        </div>

                        <!-- 대댓글 입력폼 (댓글 바로 아래) -->
                        <div class="comment-reply-box reply-form"
                             th:id="'reply-form-' + ${comment.id}"
                             style="display:none;"
                             sec:authorize="isAuthenticated()">
                            <form th:action="@{/cafe/{cafeCode}/postComment/replyProc(cafeCode=${cafe.code}, b=${data.boardCode})}"
                                  method="post"
                                  class="comment-reply-form">

                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="postId" th:value="${data.id}">
                                <input type="hidden" name="postCommentId" th:value="${comment.id}">

                                <input type="text"
                                       name="content"
                                       class="comment-reply-input"
                                       placeholder="답글을 입력하세요">
                                <button type="submit" class="comment-reply-btn">등록</button>
                            </form>
                        </div>

                    </div>
                </div>

                <!-- 페이징 -->
                <div class="page-btn-group" th:if="${commentList.totalPages > 1}">

                    <a class="page-btn"
                       th:classappend="${commentList.first} ? ' disabled'"
                       th:href="@{/cafe/{cafeCode}/post/view/{id}(cafeCode=${cafe.code}, id=${data.id}, b=${data.boardCode}, page=${commentList.number - 1})}">이전</a>

                    <span class="page-count"
                          th:text="${commentList.number + 1} + ' / ' + ${commentList.totalPages}"></span>

                    <a class="page-btn"
                       th:classappend="${commentList.last} ? ' disabled'"
                       th:href="@{/cafe/{cafeCode}/post/view/{id}(cafeCode=${cafe.code}, id=${data.id}, b=${data.boardCode}, page=${commentList.number + 1})}">다음</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
        <div id="copyToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">링크 복사됨!</div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script>
        function noLoginLikeButton() {
            alert('로그인 후 이용 가능합니다.');
        }

        // 댓글
        function commentSave() {
            const form = document.commentForm;
            if (!form) return;

            const contentEl = form.querySelector('[name="content"]');
            if (!contentEl || contentEl.value.trim() === '') {
                alert('내용을 입력해주세요');
                if (contentEl) contentEl.focus();
                return;
            }

            if (confirm('등록하시겠습니까?')) {
                const action = form.dataset.createAction;
                if (!action) {
                    alert('댓글 등록 경로가 설정되지 않았습니다.');
                    return;
                }
                form.action = action;
                form.method = 'post';
                form.submit();
            }
        }

        function commentUpdate() {
            const form = document.commentForm;
            if (!form) return;

            const contentEl = form.querySelector('[name="content"]');
            if (!contentEl || contentEl.value.trim() === '') {
                alert('내용을 입력해주세요');
                if (contentEl) contentEl.focus();
                return;
            }

            if (confirm('수정하시겠습니까?')) {
                const action = form.dataset.updateAction;
                if (!action) {
                    alert('댓글 수정 경로가 설정되지 않았습니다.');
                    return;
                }
                form.action = action;
                form.method = 'post';
                form.submit();
            }
        }

        function toggleReplyForm(commentId) {
            const box = document.getElementById('reply-form-' + commentId);
            if (!box) return;

            // 다른 폼 닫기
            document.querySelectorAll('.reply-form').forEach(f => {
                if (f !== box) f.style.display = 'none';
            });

            // 현재 폼 토글
            box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
        }

        function autoResize(textarea) {
            if (!textarea) return;
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.querySelector('.cafe-comment-textarea');
            if (!textarea) return;
            textarea.addEventListener('input', () => autoResize(textarea));
            autoResize(textarea);
        });

        function showCopyToast(message, isError = false) {
            const toastEl = document.getElementById("copyToast");
            if (!toastEl) return;

            const body = toastEl.querySelector(".toast-body");
            if (body) body.textContent = message;

            toastEl.classList.toggle("text-bg-danger", isError);

            const closeBtn = toastEl.querySelector(".btn-close");
            if (closeBtn) closeBtn.classList.toggle("btn-close-white", isError);

            const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 1600 });
            toast.show();
        }

        function copyPostLink(e) {
            e.preventDefault();
            const url = window.location.href;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url)
                    .then(() => showCopyToast("링크 복사됨!"))
                    .catch(() => fallbackCopy(url));
                return;
            }
            fallbackCopy(url);
        }

        function fallbackCopy(text) {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();

            try {
                const ok = document.execCommand("copy");
                if (ok) showCopyToast("링크 복사됨!");
                else showCopyToast("복사 실패", true);
            } catch (e) {
                showCopyToast("복사 실패", true);
            } finally {
                document.body.removeChild(ta);
            }
        }
    </script>
    <!-- ================= 본문 끝 ================= -->
</div>

</body>
</html>
