<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(cafe?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${cafe.imgName}|},
               headerPosition='center center',
               sidebarKey='custom'">
<body>

<h1 layout:fragment="pageTitle">My Cafe</h1>
<span layout:fragment="pageSubTitle">first page</span>

<div layout:fragment="content">
    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <!-- ================= 본문 ================= -->
    <div class="page-container">

        <!-- 게시글 상세 -->
        <div class="cafe-article-wrap">

            <!-- 제목/메타 -->
            <div class="cafe-article-header">
                <h1 class="cafe-article-title" th:text="${data.title}">제목</h1>

                <div class="cafe-article-meta">
                    <span th:text="${data.username} ?: '알 수 없음'">작성자</span>

                    <span th:if="${data.createDate != null}"
                          th:text="${#dates.format(data.createDate, 'yyyy.MM.dd')}">1111.11.11</span>

                    <span th:if="${viewCnt != null}">
                        조회 <b th:text="${viewCnt}">0</b>
                    </span>

                    <span th:if="${likeCnt != null}">
                        좋아요 <b th:text="${likeCnt}">0</b>
                    </span>

                    <!-- 글 링크 복사 -->
                    <span th:if="${isTrash != true}" style="margin-left: auto;">
                        <a href="#" class="comment-link-btn" onclick="copyPostLink(event)">링크 복사</a>
                    </span>
                </div>
            </div>

            <!-- 본문 -->
            <div class="cafe-article-content" th:utext="${data.content}">
                본문
            </div>

            <!-- 버튼 -->
            <div class="cafe-article-actions">
                <a class="cafe-action-btn"
                   th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe?.code}, b=${board?.code})}">
                    목록
                </a>

                <a class="cafe-action-btn"
                   th:if="${canEdit}"
                   th:href="@{|/cafe/${cafe?.code}/post/update/${data.id}?b=${data.boardCode}|}">
                    수정
                </a>

                <form th:if="${canEdit}"
                      th:action="@{|/cafe/${cafe?.code}/post/deleteProc/${data.id}?b=${data.boardCode}|}"
                      method="post"
                      onsubmit="return confirm('삭제된 글은 복구할 수 없습니다. 삭제하시겠습니까?');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="cafe-action-btn danger">삭제</button>
                </form>
            </div>

            <!--========================= 좋아요 ============================-->
            <form class="like-form"
                  th:if="${isTrash != true}"
                  action="/like/createProc"
                  method="post"
                  sec:authorize="isAuthenticated()">
                <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                <input type="hidden" name="postId" th:value="${data.id}">
                <input type="hidden" name="cafeCode" th:value="${cafe.code}">
                <input type="hidden" name="boardCode" th:value="${board.code}">

                <button type="submit" class="like-btn" th:classappend="${isLike} ? ' active' : ''">
                    <span class="like-icon" th:if="${!isLike}">🤍</span>
                    <span class="like-icon" th:if="${isLike}">❤️</span>
                    <span class="like-text">좋아요</span>
                </button>
            </form>

            <div class="like-form"
                 th:if="${isTrash != true}"
                 sec:authorize="isAnonymous()">
                <button type="button" class="like-btn" onclick="noLoginLikeButton();">
                    <span class="like-icon">🤍</span>
                    <span class="like-text">좋아요</span>
                </button>
            </div>

            <!-- 댓글(미구현) - 디자인만 맞춤 -->
            <div class="cafe-comment-section">
                <div class="cafe-comment-title">
                    댓글 <span>0</span>
                </div>

                <div class="text-muted">
                    댓글(미구현)
                </div>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
        <div id="copyToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">링크 복사됨!</div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script>
        function noLoginLikeButton() {
            alert('로그인 후 이용 가능합니다.');
        }

        function showCopyToast(message, isError = false) {
            const toastEl = document.getElementById("copyToast");
            if (!toastEl) return;

            const body = toastEl.querySelector(".toast-body");
            if (body) body.textContent = message;

            toastEl.classList.toggle("text-bg-danger", isError);

            const closeBtn = toastEl.querySelector(".btn-close");
            if (closeBtn) closeBtn.classList.toggle("btn-close-white", isError);

            const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 1600 });
            toast.show();
        }

        function copyPostLink(e) {
            e.preventDefault();
            const url = window.location.href;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url)
                    .then(() => showCopyToast("링크 복사됨!"))
                    .catch(() => fallbackCopy(url));
                return;
            }
            fallbackCopy(url);
        }

        function fallbackCopy(text) {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();

            try {
                const ok = document.execCommand("copy");
                if (ok) showCopyToast("링크 복사됨!");
                else showCopyToast("복사 실패", true);
            } catch (e) {
                showCopyToast("복사 실패", true);
            } finally {
                document.body.removeChild(ta);
            }
        }
    </script>
    <!-- ================= 본문 끝 ================= -->
</div>

</body>
</html>
