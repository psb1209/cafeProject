<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle">My Cafe</h1>
<span layout:fragment="pageSubTitle">first page</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <h2 class="mb-2" th:text="${data.title}">제목</h2>

    <div class="text-muted small mb-2 d-flex justify-content-end align-items-center gap-2">
        <span th:text="${data.username} ?: '알 수 없음'">작성자</span>
        <span th:if="${data.createDate != null}">
            · <span th:text="${#dates.format(data.createDate, 'yyyy-MM-dd HH:mm')}">2025-12-19 18:00</span></span>
    </div>

    <hr class="my-3"/>

    <div class="d-flex justify-content-end mb-3">
        <a href="#"
           class="small text-decoration-none"
           onclick="copyPostLink(event)">
            글 링크 복사
        </a>
    </div>

    <div class="post-content">
        <div th:utext="${data.content}"></div>
    </div>

    <hr class="my-4"/>
    <div class="text-muted">
        댓글(미구현)
    </div>

    <div class="mt-4">
        <a class="btn btn-secondary"
           th:href="@{/post/list(b=${board?.code})}">
            목록으로
        </a>
        <a class="btn btn-secondary"
           th:if="${canEdit}"
           th:href="@{|/post/update/${data.id}?b=${data.boardCode}|}">
            수정
        </a>
        <form th:if="${canEdit}"
              th:action="@{|/post/deleteProc/${data.id}?b=${data.boardCode}|}"
              method="post"
              onsubmit="return confirm('삭제처리할까요?');">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-danger">삭제</button>
        </form>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
        <div id="copyToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">링크 복사됨!</div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script>
        function showCopyToast(message, isError = false) {
            const toastEl = document.getElementById("copyToast");
            if (!toastEl) return;

            const body = toastEl.querySelector(".toast-body");
            if (body) body.textContent = message;

            toastEl.classList.toggle("text-bg-danger", isError);

            const closeBtn = toastEl.querySelector(".btn-close");
            if (closeBtn) closeBtn.classList.toggle("btn-close-white", isError);

            const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 1600 });
            toast.show();
        }

        function copyPostLink(e) {
            e.preventDefault();
            const url = window.location.href;

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(url)
                    .then(() => showCopyToast("링크 복사됨!"))
                    .catch(() => fallbackCopy(url));
                return;
            }
            fallbackCopy(url);
        }

        function fallbackCopy(text) {
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.left = "-9999px";
            document.body.appendChild(ta);
            ta.focus();
            ta.select();

            try {
                const ok = document.execCommand("copy");
                if (ok) showCopyToast("링크 복사됨!");
                else showCopyToast("복사 실패", true);
            } catch (e) {
                showCopyToast("복사 실패", true);
            } finally {
                document.body.removeChild(ta);
            }
        }
    </script>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
