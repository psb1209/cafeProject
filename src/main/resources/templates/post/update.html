<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(cafe?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${cafe.imgName}|},
               headerPosition='center center'">

<body>
<h1 layout:fragment="pageTitle" th:text="${board?.name} ?: 'My Cafe'">My Cafe</h1>
<span layout:fragment="pageSubTitle" th:text="${board?.description} ?: 'first page'">first page</span>

<div layout:fragment="content" class="container mt-3">

    <h2 class="mb-3">글 수정</h2>

    <form name="form" method="post"
          th:action="@{/cafe/{cafeCode}/post/updateProc(cafeCode=${cafe?code}, b=${data.boardCode})}"
          th:object="${data}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:field="*{boardId}"/>
        <input type="hidden" th:field="*{boardCode}"/>
        <input type="hidden" th:field="*{boardName}"/>

        <div class="alert alert-danger" th:if="${#fields.hasGlobalErrors()}">
            <div th:each="e : ${#fields.globalErrors()}" th:text="${e}">에러</div>
        </div>

        <div class="mb-3">
            <label for="title" class="form-label">제목</label>
            <input id="title"
                   type="text"
                   class="form-control"
                   th:field="*{title}"
                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                   placeholder="제목을 입력하세요">
            <div class="invalid-feedback" th:errors="*{title}">제목 에러</div>
        </div>

        <div class="mb-3">
            <label for="content" class="form-label">내용</label>
            <textarea id="content"
                      class="form-control"
                      rows="12"
                      th:field="*{content}"
                      th:classappend="${#fields.hasErrors('content')} ? 'is-invalid' : ''"></textarea>
            <div class="invalid-feedback" th:errors="*{content}">내용 에러</div>
        </div>

        <div class="form-check mb-4">
            <input class="form-check-input"
                   type="checkbox"
                   id="notice"
                   th:field="*{notice}">
            <label class="form-check-label" for="notice">
                공지로 등록
            </label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">수정 완료</button>

            <a class="btn btn-outline-secondary"
               th:href="@{|/cafe/${cafe?code}/post/view/${data.id}?b=${data.boardCode}|}">
                취소
            </a>

            <a class="btn btn-outline-secondary"
               th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe?code}, b=${data.boardCode})}">
                목록으로
            </a>
        </div>
    </form>

    <script>
        $(document).ready(function() {

            // CSRF META 태그에서 값 읽기
            let header = $("meta[name='_csrf_header']").attr("content");
            let token = $("meta[name='_csrf']").attr("content");

            // 모든 AJAX 요청마다 CSRF 자동 추가
            $.ajaxSetup({
                beforeSend: function(xhr) {
                    xhr.setRequestHeader(header, token);
                }
            });

            $("#content").summernote({
                height: 300,
                lang: 'ko-KR',
                placeholder: '내용을 입력하세요',
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'italic', 'underline', 'clear']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['insert', ['link', 'picture']]
                ],
                callbacks: {
                    onImageUpload: function(files) {
                        uploadSummernoteImageFile(files[0], this);
                    }
                }
            });
        });

        function uploadSummernoteImageFile(file, editor) {
            let data = new FormData();
            data.append("file", file);

            $.ajax({
                url: "/post/uploadImage",
                type: "POST",
                enctype: 'multipart/form-data',
                data: data,
                processData: false,
                contentType: false,
                success: function (response) {
                    $(editor).summernote('insertImage', response.url);
                },
                error: function() {
                    alert("이미지 업로드 실패");
                }
            });
        }
    </script>
</div>
</body>
</html>
