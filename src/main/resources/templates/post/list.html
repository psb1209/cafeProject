<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(board?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${board.imgName}|},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle" th:text="${board?.name} ?: 'My Cafe'">My Cafe</h1>
<span layout:fragment="pageSubTitle" th:text="${board?.description} ?: 'first page'">first page</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <a class="btn btn-primary"
           th:href="@{/post/create(b=${code})}">
            글쓰기
        </a>
    </div>

    <!-- 게시글이 없을 때 -->
    <div class="alert alert-info" th:if="${list.totalElements == 0}">
        아직 등록된 게시글이 없습니다. 첫 글을 작성해보자!
    </div>

    <!-- 게시글 목록 -->
    <div th:if="${list.totalElements > 0}">
        <div class="post-preview" th:each="p : ${list.content}">
            <a th:href="@{|/post/view/${p.id}?b=${code}|}">
                <h2 class="post-title" th:text="${p.title}">Post title</h2>
            </a>

            <p class="post-meta d-flex justify-content-between align-items-center">
                <span>
                    Writer :
                    <a th:text="${p.username} ?: '알 수 없음'">Writer</a></span>
                <span class="text-muted small"
                      th:if="${p.createDate != null}"
                      th:text="${#dates.format(p.createDate, 'yyyy-MM-dd')}"></span>
            </p>


            <!-- Divider-->
            <hr class="my-4" />
        </div>
    </div>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
