<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(board?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${board.imgName}|},
               headerPosition='center center',
               sidebarKey='cafe'">

<body>

<h1 layout:fragment="pageTitle"
    th:text="${board?.name} ?: 'My Cafe'">My Cafe</h1>

<span layout:fragment="pageSubTitle"
      th:text="${board?.description} ?: 'first page'">first page</span>

<div layout:fragment="content">
    <link th:href="@{/css/board.css}" rel="stylesheet"/>

    <div class="page-container">
        <div class="cafe-board-wrap">

            <!-- ================= 게시판 헤더 ================= -->
            <div class="cafe-board-header">
                <div class="cafe-board-title"
                     th:text="${board?.name}">게시판</div>

                <div class="cafe-article-actions">
                    <a class="cafe-action-btn write"
                       th:href="@{/post/create(b=${board?.code})}">✏️ 글쓰기</a>
                </div>
            </div>

            <!-- ================= 검색 ================= -->
            <div class="cafe-board-search">
                <form method="get"
                      th:action="@{/post/list}"
                      class="cafe-search-form">
                    <input type="hidden" name="b" th:value="${board?.code}">
                    <input type="search"
                           name="keyword"
                           placeholder="게시판 검색"
                           th:value="${keyword}">
                    <button type="submit">🔍</button>
                </form>
            </div>

            <!-- ================= 게시글 없음 ================= -->
            <div th:if="${(noticeList == null or noticeList.isEmpty()) and list.totalElements == 0}"
                 class="text-center"
                 style="padding:40px; color:#888;">
                등록된 게시글이 없습니다.
            </div>

            <!-- ================= 게시글 테이블 ================= -->
            <table class="cafe-board-table"
                   th:if="${(noticeList != null and !noticeList.isEmpty()) or list.totalElements > 0}">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
<!--                    <th class="col-cnt">조회수</th>-->
                    <th class="col-writer">작성자</th>
                    <th class="col-writer">회원등급</th>
                    <th class="col-date">작성일</th>
                </tr>
                </thead>

                <!-- 공지글 -->
                <tbody th:if="${noticeList != null and !noticeList.isEmpty() and list.number == 0}">
                <tr th:each="notice : ${noticeList}" class="notice-row"
                    th:onclick="|location.href='@{|/post/view/${notice.id}?b=${board?.code}|}'|">
                    <td class="text-danger fw-bold text-center">공지</td>
                    <td>
                        📢 <span th:text="${notice.title ?: '(제목 없음)'}"></span>
                        <form th:if="${#authorization.expression('hasAnyRole(''ROLE_ADMIN'',''ROLE_MANAGER'')')}"
                              th:action="@{/post/toggleNotice/{id}(id=${notice.id})}"
                              method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="notice-btn">공지해제</button>
                        </form>
                    </td>
<!--                    <td class="td_underline" th:text="${viewCntMap[notice.id]}"></td>-->
                    <td class="td_underline" th:text="${notice.username}"></td>
                    <td class="td_underline text-center">운영진</td>
                    <td class="td_underline text-center" th:text="${#dates.format(notice.createDate,'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>

                <!-- 일반글 -->
                <tbody>
                <tr th:each="post, loop : ${list.content}"
                    th:onclick="|location.href='@{|/post/view/${post.id}?b=${board?.code}|}'|"
                    style="cursor:pointer;">
                    <td class="td_underline text-center" th:text="${list.number * list.size + loop.index + 1}"></td>
                    <td>
                        <span th:text="${post.title ?: '(제목 없음)'}"></span>
                        <form th:if="${#authorization.expression('hasAnyRole(''ROLE_ADMIN'',''ROLE_MANAGER'')')}"
                              th:action="@{/post/toggleNotice/{id}(id=${post.id})}"
                              method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="notice-btn">공지등록</button>
                        </form>
                    </td>
<!--                    <td class="td_underline text-center" th:text="${viewCntMap[post.id]}"></td>-->
                    <td class="td_underline text-center" th:text="${post.username ?: '알 수 없음'}"></td>
                    <td class="td_underline text-center" th:switch="${post.grade != null ? post.grade.name() : 'NONE'}">
                        <span th:case="'USER'">일반🥉</span>
                        <span th:case="'REGULAR'">성실🥈</span>
                        <span th:case="'BEST'">우수🥇</span>
                        <span th:case="'SPECIAL'">최우수🏆</span>
                        <span th:case="'NONE'">-</span>
                    </td>
                    <td class="td_underline text-center" th:text="${#dates.format(post.createDate,'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>
            </table>

            <!-- ================= 페이징 ================= -->
            <div class="cafe-pagination"
                 th:if="${list.totalPages > 1}"
                 th:with="
                    cd=${#strings.isEmpty(board?.code) ? '' : '&b=' + board?.code},
                    kw=${#strings.isEmpty(keyword) ? '' : '&keyword=' + keyword}">
                <a class="page-btn"
                   th:classappend="${list.first} ? ' disabled'"
                   th:href="@{|?page=${list.number-1}${cd}${kw}|}">이전</a>

                <a class="page-btn"
                   th:each="page : ${#numbers.sequence(0, list.totalPages-1)}"
                   th:if="${page >= (list.number/5)*5 and page <= (list.number/5)*5 + 4}"
                   th:text="${page + 1}"
                   th:classappend="${page == list.number} ? ' active'"
                   th:href="@{|?page=${page}${cd}${kw}|}"></a>

                <a class="page-btn"
                   th:classappend="${list.last} ? ' disabled'"
                   th:href="@{|?page=${list.number+1}${cd}${kw}|}">다음</a>
            </div>

        </div>
    </div>
</div>

</body>
</html>
