<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="
          headerImage=${#strings.isEmpty(cafe?.imgName)}
                        ? @{/assets/img/post-sample-image.jpg}
                        : @{|${imageUrlPrefix}${cafe.imgName}|},
          headerPosition='center center',
          sidebarKey='cafe'
      ">
<body>

<!-- 상단 헤더(레이아웃 fragment) -->
<h1 layout:fragment="pageTitle"
    th:text="${cafe?.name} ?: 'My Cafe'"
    th:onclick="${!#strings.isEmpty(cafeCode)}
                ? |location.href='@{/cafe/{cafeCode}(cafeCode=${cafeCode})}'|
                : (cafe != null && !#strings.isEmpty(cafe.code))
                    ? |location.href='@{/cafe/{cafeCode}(cafeCode=${cafe.code})}'|
                    : |location.href='/'|"
    style="cursor: pointer;">카페 이름</h1>

<!-- 부제: 설명 첫 줄(없으면 기본 문구) -->
<span layout:fragment="pageSubTitle"
      th:with="desc=${cafe?.description == null ? null : cafe.description.trim().replace('\r','')}"
      th:text="${#strings.isEmpty(desc) ? '카페 소개' : desc.split('\n')[0]}">
    카페 소개
</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <!-- ================= 본문 시작 ================= -->
    <div class="cafe-board-wrap">

        <div class="cafe-board-header">
            <h2 class="cafe-board-title"
                th:text="${(cafe?.name ?: 'My Cafe') + ' 소개'}">카페 소개</h2>
        </div>

        <!-- 소개 본문 -->
        <div class="cafe-article-content"
             th:with="desc=${cafe?.description == null ? '' : cafe.description.trim().replace('\r','')}"
             style="white-space: pre-line;">

            <!-- description 있을 때 -->
            <div th:if="${!#strings.isEmpty(desc)}"
                 th:text="${desc}">
                카페 소개 내용
            </div>

            <!-- description 없을 때 -->
            <p th:if="${#strings.isEmpty(desc)}">
                아직 카페 소개가 등록되지 않았습니다.<br>
                카페 설정에서 소개글을 작성해 주세요.
            </p>
        </div>

    </div>
    <!-- ================= 본문 종료 ================= -->

</div>
</body>
</html>
