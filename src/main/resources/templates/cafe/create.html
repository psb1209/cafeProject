<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle">ㅁㄴㅇㄹ</h1>
<span layout:fragment="pageSubTitle">ㅁㄴㅇㄹ!!!</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <h2>카페 만들기</h2>

    <form name="form"
          id="form"
          th:action="@{/cafe/createProc}"
          method="post"
          th:object="${data}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" name="imgName" id="imgName">

        <div class="mb-3 mt-3">
            <label for="name"> 카페 이름:</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'"
                   id="name"
                   placeholder="카페 이름을 입력해주세요."
                   required>
            <div class="invalid-feedback d-block"
                 th:if="${#fields.hasErrors('name')}"
                 th:errors="*{name}">
            </div>
        </div>


        <div class="mb-3 mt-3">
            <label for="description"> 카페 설명:</label>
            <input type="text"
                   class="form-control"
                   th:field="*{description}"
                   th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"
                   id="description"
                   placeholder="카페 설명을 입력해주세요."
                   required>
            <div class="invalid-feedback d-block"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}">
            </div>
        </div>

        <div>
            <label for="code"> 설정할 링크:</label>
            <input type="text"
                   class="form-control"
                   th:field="*{code}"
                   th:classappend="${#fields.hasErrors('code')} ? ' is-invalid'"
                   id="code"
                   placeholder="카페 링크를 입력해주세요."
                   required>
            <div class="invalid-feedback d-block"
                 th:if="${#fields.hasErrors('code')}"
                 th:errors="*{code}">
            </div>
        </div>

        <div class="mb-3 mt-3">
            <label for="imgFile" class="form-label">대표 이미지</label>
            <input type="file" class="form-control" id="imgFile" accept="image/*">
            <img id="imagePreview" style="max-width:200px; display:none; margin-top:8px;">
        </div>

        <button type="button" id="btn-save" class="btn btn-secondary" onclick="save();">
            카페 만들기</button>
    </form>

    <script>
        function save() {
            if (confirm('추가하시겠습니까?')) {
                document.getElementById('form').submit();
            }
        }
    </script>
    <script>
        $(document).ready(function () {

          // CSRF (meta 태그가 있어야 함)
          const header = $("meta[name='_csrf_header']").attr("content");
          const token  = $("meta[name='_csrf']").attr("content");

          const $btnSave = $("#btn-save");

          $("#imgFile").on("change", function () {
            const file = this.files && this.files[0];
            if (!file) return;

            if (!file.type.startsWith("image/")) {
              alert("이미지 파일만 업로드할 수 있습니다.");
              this.value = "";
              return;
            }

            const fd = new FormData();
            fd.append("file", file);

            // 업로드 시작: 저장 버튼 비활성화
            $btnSave.prop("disabled", true);

            $.ajax({
              url: "/cafe/uploadImage",
              type: "POST",
              data: fd,
              processData: false,
              contentType: false,
              dataType: "json",
              beforeSend: function (xhr) {
                if (header && token) xhr.setRequestHeader(header, token);
              },
              success: function (res) {
                $("#imgName").val(res.fileName);
                $("#imagePreview").attr("src", res.url).show();
              },
              error: function (xhr) {
                alert("대표 이미지 업로드 실패 (" + xhr.status + ")");
                $("#imgName").val("");
                $("#imagePreview").hide();
              },
              complete: function () {
                // 업로드 종료(성공/실패 상관없이): 저장 버튼 다시 활성화
                $btnSave.prop("disabled", false);
              }
            });
          });
        });
    </script>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
