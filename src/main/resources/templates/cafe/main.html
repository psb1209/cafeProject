<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(cafe?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${cafe.imgName}|},
               headerPosition='center center',
               sidebarKey='cafe'">

<body>

<h1 layout:fragment="pageTitle" th:text="${cafe?.name} ?: 'My Cafe'" onclick="location.href='/'" style="cursor: pointer;">카페 이름</h1>
<span layout:fragment="pageSubTitle" th:text="${cafe?.description} ?: 'description'">카페 설명</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/theme2.css}" rel="stylesheet" />
    <div class="page-container">
<!--==================================================================================================================-->
        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title" onclick="location.href='/noticeBoard/list'" style="cursor: pointer;">공지사항</div>

                <a href="/noticeBoard/list" class="cafe-more-btn">
                    <span class="more-text">더보기</span>
                    <span class="arrow">›</span>
                </a>
<!--                <div class="cafe-article-actions" sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')">
                    <a th:href="@{/noticeBoard/create}"
                       class="cafe-action-btn write">
                        ✏️ 게시글 작성
                    </a>
                </div>-->
            </div>

            <table class="cafe-board-table">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <tbody th:if="${!noticeBoardList.isEmpty()}">
                <tr th:each="noticeBoard, loop : ${noticeBoardList}" class="text-center"
                    th:onclick="|location.href='@{|/noticeBoard/view/${noticeBoard.id}|}'|">

                    <td th:text="${loop.index + 1}"></td>
                    <td class="col-subject" th:text="${noticeBoard.subject}"></td>
                    <td class="col-writer text-center" th:text="${noticeBoard.member?.username ?: '-'}"></td>
                </tr>
                </tbody>

                <tbody th:if="${noticeBoardList.isEmpty()}">
                <tr>
                    <td class="text-center" colspan="3">게시글이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title" onclick="location.href='/informationBoard/list'" style="cursor: pointer;">정보게시판</div>

                <a href="/informationBoard/list" class="cafe-more-btn">
                    <span class="more-text">더보기</span>
                    <span class="arrow">›</span>
                </a>

  <!--              <div class="cafe-article-actions">
                    <a th:href="@{/informationBoard/create}"
                       class="cafe-action-btn write">
                        ✏️ 게시글 작성
                    </a>
                </div>-->
            </div>

            <table class="cafe-board-table">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <tbody th:if="${!informationBoardList.isEmpty()}">
                <tr th:each="informationBoard, loop : ${informationBoardList}" class="text-center"
                    th:onclick="|location.href='@{|/informationBoard/view/${informationBoard.id}|}'|">

                    <td th:text="${loop.index + 1}"></td>
                    <td class="col-subject" th:text="${informationBoard.subject}"></td>
                    <td class="col-writer text-center" th:text="${informationBoard.member?.username ?: '-'}"></td>
<!--                    <td class="col-writer text-center"> -</td>-->
                </tr>
                </tbody>
                <tbody th:if="${informationBoardList.isEmpty()}">
                <tr>
                    <td class="text-center" colspan="3">게시글이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title" onclick="location.href='/communityBoard/list'" style="cursor: pointer;">자유게시판</div>

                <a href="/communityBoard/list" class="cafe-more-btn">
                    <span class="more-text">더보기</span>
                    <span class="arrow">›</span>
                </a>
<!--                <div class="cafe-article-actions">
                    <a th:href="@{/communityBoard/create}"
                       class="cafe-action-btn write">
                        ✏️ 게시글 작성
                    </a>
                </div>-->
            </div>

            <table class="cafe-board-table">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <tbody th:if="${!communityBoardList.isEmpty()}">
                <tr th:each="communityBoard, loop : ${communityBoardList}"  class=" text-center"
                    th:onclick="|location.href='@{|/communityBoard/view/${communityBoard.id}|}'|">

                    <td th:text="${loop.index + 1}"></td>
                    <td class="col-subject" th:text="${communityBoard.subject}"></td>
                    <td class="col-writer text-center" th:text="${communityBoard.member?.username ?: '-'}"></td>
                </tr>
                </tbody>
                <tbody th:if="${communityBoardList.isEmpty()}">
                <tr>
                    <td class="text-center" colspan="3">게시글이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
</div>

<script th:if="${noticeBoard2List.isEmpty()}">
    alert([[${errMsg}]]);
</script>

</body>
</html>
