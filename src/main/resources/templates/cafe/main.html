<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(cafe?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${cafe.imgName}|},
               headerPosition='center center',
               sidebarKey='custom'">

<body>

<h1 layout:fragment="pageTitle"
    th:text="${cafe?.name} ?: 'My Cafe'"
    th:onclick="${cafe != null}
                ? |location.href='@{/cafe/{cafeCode}(cafeCode=${cafe.code})}'|
                : |location.href='/'|"
    style="cursor: pointer;">카페 이름</h1>

<span layout:fragment="pageSubTitle"
      th:with="desc=${cafe?.description == null ? null : cafe.description.trim().replace('\r','')}"
      th:text="${#strings.isEmpty(desc) ? 'description' : desc.split('\n')[0]}">
    카페 설명
</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/theme2.css}" rel="stylesheet" />

    <div class="page-container">

        <!-- ====================================================================================================== -->
        <!-- 공지사항 -->
        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title"
                     th:onclick="|location.href='@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='noticeBoard')}'|"
                     style="cursor: pointer;">공지사항</div>

                <a class="cafe-more-btn"
                   th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='noticeBoard')}">
                    <span class="more-text">더보기</span>
                    <span class="arrow">›</span>
                </a>
            </div>

            <table class="cafe-board-table">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <tbody th:if="${noticeBoardList != null and !noticeBoardList.isEmpty()}">
                <tr th:each="noticeBoard, loop : ${noticeBoardList}"
                    class="text-center"
                    th:onclick="|location.href='@{/cafe/{cafeCode}/post/view/{id}(cafeCode=${cafe.code}, id=${noticeBoard.id}, b='noticeBoard')}'|">
                    <td th:text="${loop.index + 1}"></td>
                    <td class="col-subject" th:text="${noticeBoard.title}"></td>
                    <td class="col-writer text-center" th:text="${noticeBoard.username ?: '-'}"></td>
                </tr>
                </tbody>

                <tbody th:if="${noticeBoardList == null or noticeBoardList.isEmpty()}">
                <tr>
                    <td class="text-center" colspan="3">게시글이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ====================================================================================================== -->
        <!-- 정보게시판 -->
        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title"
                     th:onclick="|location.href='@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='informationBoard')}'|"
                     style="cursor: pointer;">정보게시판</div>

                <a class="cafe-more-btn"
                   th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='informationBoard')}">
                    <span class="more-text">더보기</span>
                    <span class="arrow">›</span>
                </a>
            </div>

            <table class="cafe-board-table">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <tbody th:if="${informationBoardList != null and !informationBoardList.isEmpty()}">
                <tr th:each="informationBoard, loop : ${informationBoardList}"
                    class="text-center"
                    th:onclick="|location.href='@{/cafe/{cafeCode}/post/view/{id}(cafeCode=${cafe.code}, id=${informationBoard.id}, b='informationBoard')}'|">
                    <td th:text="${loop.index + 1}"></td>
                    <td class="col-subject" th:text="${informationBoard.title}"></td>
                    <td class="col-writer text-center" th:text="${informationBoard.username ?: '-'}"></td>
                </tr>
                </tbody>

                <tbody th:if="${informationBoardList == null or informationBoardList.isEmpty()}">
                <tr>
                    <td class="text-center" colspan="3">게시글이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ====================================================================================================== -->
        <!-- 자유게시판 -->
        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title"
                     th:onclick="|location.href='@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='communityBoard')}'|"
                     style="cursor: pointer;">자유게시판</div>

                <a class="cafe-more-btn"
                   th:href="@{/cafe/{cafeCode}/post/list(cafeCode=${cafe.code}, b='communityBoard')}">
                    <span class="more-text">더보기</span>
                    <span class="arrow">›</span>
                </a>
            </div>

            <table class="cafe-board-table">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <tbody th:if="${communityBoardList != null and !communityBoardList.isEmpty()}">
                <tr th:each="communityBoard, loop : ${communityBoardList}"
                    class="text-center"
                    th:onclick="|location.href='@{/cafe/{cafeCode}/post/view/{id}(cafeCode=${cafe.code}, id=${communityBoard.id}, b='communityBoard')}'|">
                    <td th:text="${loop.index + 1}"></td>
                    <td class="col-subject" th:text="${communityBoard.title}"></td>
                    <td class="col-writer text-center" th:text="${communityBoard.username ?: '-'}"></td>
                </tr>
                </tbody>

                <tbody th:if="${communityBoardList == null or communityBoardList.isEmpty()}">
                <tr>
                    <td class="text-center" colspan="3">게시글이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
