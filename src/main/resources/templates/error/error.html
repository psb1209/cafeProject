<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="showHeader=false,
               showSidebar=false">

<body>

<h1 layout:fragment="pageTitle"
    onclick="location.href='/healthCafe'"
    style="cursor: pointer;">
    헬 사 모
</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet"/>

    <!-- ================= 에러 카드 ================= -->
    <div class="write-page narrow">
        <div class="write-card narrow">

            <div class="write-header">
                ⚠ 에러가 발생했습니다
            </div>

            <div class="write-group">
                <label class="write-label">에러 코드</label>
                <span class="member-view-box" th:text="${errCode}"></span>
            </div>

            <div class="write-group">
                <label class="write-label">에러 메시지</label>
                <span class="member-view-box" th:text="${errMsg}"></span>
            </div>

            <div class="write-action-bar">
                <button type="button"
                        class="write-btn primary"
                        onclick="location.href='/healthCafe'">
                    홈으로
                </button>
            </div>

        </div>
    </div>
    <!-- ================= 에러 카드 끝 ================= -->

</div>
</body>
</html>
