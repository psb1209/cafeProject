<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">

<body>

<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <!-- ================= 스타일 ================= -->
    <style>
        :root {
            --blue-main: #1e6fd9;
            --blue-border: #cfe1ff;
            --text-main: #1f2a44;
            --text-sub: #6b7a99;
            --white: #ffffff;
        }

        .page-container {
            display: flex;
            gap: 24px;
        }

        /* 게시글 카드 */
        .cafe-article-wrap {
            flex: 1;
            background: var(--white);
            border-top: 4px solid var(--blue-main);
            border-radius: 10px;
            padding: 30px;
            font-size: 14px;
        }

        .cafe-article-header {
            border-bottom: 1px solid var(--blue-border);
            padding-bottom: 16px;
            margin-bottom: 26px;
        }

        .cafe-article-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .cafe-article-meta {
            font-size: 13px;
            color: var(--text-sub);
            display: flex;
            gap: 14px;
        }

        .cafe-article-content {
            padding: 24px 0 40px;
            font-size: 15px;
            line-height: 1.8;
        }

        /* 버튼 영역 */
        .write-action-bar {
            border-top: 1px solid var(--blue-border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        /* 기본 버튼 */
        .write-btn {
            margin-top: 30px;
            min-width: 96px;
            height: 40px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #dfe5f1;
            background: #fff;
            transition: all 0.2s;
        }

        .write-btn:hover {
            background: #f0f0f0; /* 취소 버튼 hover용 연한 회색 */
        }

        /* 삭제 버튼 전용 */
        .write-btn.delete {
            background: #ffeaea;       /* 연한 빨강 */
            border-color: #f5c2c2;     /* 연한 빨강 테두리 */
            color: #d9534f;            /* 진한 빨강 글자 */
            font-weight: 600;
        }

        .write-btn.delete:hover {
            background: #ffc8c8;       /* hover 시 조금 진해짐 */
        }
    </style>


    <!-- ================= 본문 ================= -->
    <div class="page-container">

        <!-- 좌측 사이드바 -->

        <nav class="sb-sidenav-menu">
            <div class="nav">

                <!-- 카페 홈 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'main'} ? ' active'"
                   th:href="@{/healthCafe}">
                    <span class="nav-emoji">🏠</span>카페 홈
                </a>

                <!-- 공지 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'noticeBoard'} ? ' active'"
                   th:href="@{/noticeBoard/list}">
                    <span class="nav-emoji">📢</span>공지사항
                </a>

                <div class="sidenav-section-title">게시판</div>

                <!-- 전체글 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'all'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">📄</span>전체글보기
                </a>

                <!-- 자유게시판 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'communityBoard'} ? ' active'"
                   th:href="@{/communityBoard/list}">
                    <span class="nav-emoji">🧩</span>자유게시판
                </a>

                <!-- 정보게시판 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'informationBoard'} ? ' active'"
                   th:href="@{/informationBoard/list}">
                    <span class="nav-emoji">🔍</span>정보게시판
                </a>

                <!-- 운영게시판 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'operationBoard'} ? ' active'"
                   th:href="@{/operationBoard/list}">
                    <span class="nav-emoji">📋</span>운영게시판
                </a>

                <!-- 사진 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'photo'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">📸</span>사진게시판
                </a>

                <!-- 질문/정보 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'qna'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">💡</span>질문/정보
                </a>

                <div class="sidenav-section-title">카페 정보</div>

                <!-- 멤버 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'members'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">👥</span>멤버
                </a>

                <!-- 소개 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'about'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">ℹ️</span>카페 소개
                </a>

            </div>
        </nav>

        <!-- 게시글 상세 -->
        <div class="cafe-article-wrap">

            <!-- 제목 -->
            <form name="DirForm"
                  id="DirForm"
                  th:action="@{/operationBoard/deleteProc}"
                  method="post">

                <input type="hidden" name="id" th:value="${operationBoard.id}">

                <div class="cafe-article-header">
                    <h1 class="cafe-article-title"
                        th:text="${operationBoard.subject}"></h1>

                    <div class="cafe-article-meta">
                        <span th:text="${operationBoard.member.username}"></span>
                        <span th:text="${#dates.format(operationBoard.createDate,'yyyy.MM.dd')}"></span>
                        <span>조회 <b th:text="${operationBoard.cnt}"></b></span>
                    </div>
                </div>

                <!-- 본문 -->
                <div class="cafe-article-content"
                     th:utext="${operationBoard.content}"></div>

                <!-- 버튼 -->
                <div class="write-action-bar">
                    <button type="button"
                            class="write-btn"
                            onclick="history.back();">
                        취소
                    </button>
                    <button type="button"
                            class="write-btn delete"
                            onclick="submitDelete();">
                        삭제
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- JS -->

    <script>
        function submitDelete() {
            if (confirm('삭제하시겠습니까?')) {
                document.getElementById('DirForm').submit();
            }
        }
    </script>

    <script>
        $(document).ready(function() {
            $("#content").summernote({
                height: 300,
                lang: 'ko-KR'
            });
       });
    </script>

</div>
</body>
</html>
