<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>
<div layout:fragment="content">
    <!-- 본문 내용 시작 -->

    <!--<h2 th:text="${operationBoard.subject}"></h2>-->

    <div class="mb-3 mt-3">
        <label for="subject">제목:</label>
        <span class="form-control" id="subject" name="subject" th:text="${operationBoard.subject}"></span>
    </div>

    <div class="mb-3">
        <label for="content">내용:</label>
        <span class="form-control" id="content" name="content" th:utext="${operationBoard.content}"></span>
    </div>

    <div class="mb-3 mt-3">
        <label for="cnt">조회수:</label>
        <span class="form-control" id="cnt" th:text="${operationBoard.cnt}"></span>
    </div>

    <div class="mb-3 mt-3">
        <label for="createDate">작성일:</label>
        <span class="form-control" id="createDate" th:text="${#dates.format(operationBoard.createDate, 'yyyy-MM-dd')}"></span>
    </div>

    <a href="/operationBoard/create" class="btn btn-secondary">등록</a>
    <a href="/operationBoard/list" class="btn btn-secondary">목록</a>
    <a th:href="@{|/operationBoard/update/${operationBoard.id}|}" class="btn btn-secondary">수정</a>
    <a th:href="@{|/operationBoard/delete/${operationBoard.id}|}" class="btn btn-secondary">삭제</a>

    <form name="commentForm">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="hidden" name="operationBoardId" th:value="${operationBoard.id}">

        <table class="table">
            <thead>
                <tr>
                    <th>댓글 목록</th>
                </tr>
            </thead>
            <!--========================================================================================-->
            <tbody>
            <tr align="right">
                <td th:if="${operationBoardCommentUpdate == null}">
                    <textarea id="comment-content" rows="1" class="form-control" name="content"></textarea>
                    <button type="button" id="btn-save-comment" class="btn btn-secondary"
                            style="margin-top: 10px" onclick="commentSave();">댓글 등록</button>
                </td>
                <td th:if="${operationBoardCommentUpdate != null}">
                    <textarea id="comment-content1" rows="1" class="form-control" name="content"
                            th:text="${operationBoardCommentUpdate.content}"></textarea>
                    <button type="button" id="btn-save-comment1" class="btn btn-secondary"
                            style="margin-top: 10px" onclick="updateComment('${reply.id}' );">댓글 수정</button>
                </td>
            </tr>
            </tbody>
            <!--========================================================================================-->
        </table>
    </form>

    <div th:if="${!operationBoard.commentList.isEmpty()}">
        <table class="table">
            <thead>
            <tr>
                <th width="70%">내용</th>
                <th width="10%">작성자</th>
                <th width="20%">수정/삭제</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="operationBoardComment : ${commentList}">
                <td th:text="${operationBoardComment.content}"></td>
                <td>
                    <span th:text="${operationBoardComment.member.username}"></span>
                </td>
                <td>
                    <!--========================================================================================-->
                    <form id="selectOfDelete">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="operationBoardId" th:value="${operationBoard.id}">
                        <input type="hidden" name="operationBoardCommentId" th:value="${operationBoardComment.id}">
                        <input type="hidden" name="content" id="commentContentHidden">
                    </form>
                    <select id="actionSelect" onchange="selectOption();">
                        <option value="">선택</option>
                        <option value="deleteProc">삭제</option>
                        <option value="updateProc">수정</option>
                    </select>
                    <!--========================================================================================-->
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div style="margin-top: 20px;" th:if="${!commentList.isEmpty()}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${commentList.first} ? 'disabled'">
                <a class="page-link"
                   th:href="${commentList.first} ? '#' : @{|?page=${commentList.number-1}|}">
                    이전
                </a>
            </li>

            <li class="page-item"
                th:each="page: ${#numbers.sequence(0, commentList.totalPages-1)}"
                th:classappend="${page == commentList.number} ? 'active'">
                <a class="page-link" th:text="${page + 1}" th:href="@{|?page=${page}|}"></a>
            </li>

            <li class="page-item" th:classappend="${commentList.last} ? 'disabled'">
                <a class="page-link"
                   th:href="${commentList.last} ? '#' : @{|?page=${commentList.number+1}|}">
                    다음
                </a>
            </li>
        </ul>
    </div>

    <!--게시글 작성-->
    <script>
        function save() {
            if (document.DirForm.content.value.trim() === '') {
                alert('내용을 입력해주세요');
                document.DirForm.content.focus();
                return;
            }

            if (confirm('추가하시겠습니까?')) {
                document.getElementById('DirForm').submit();
            }
        }
    </script>

    <!--댓글 작성-->
    <script>
        function commentSave() {
            if (document.commentForm.content.value.trim() === '') {
                alert('내용을 입력해주세요');
                document.commentForm.content.focus();
                return;
            }

            if (confirm('추가하시겠습니까?')) {
                document.commentForm.action = "/operationBoardComment/createProc";
                document.commentForm.method = "post";
                document.commentForm.submit();
            }
        }
    </script>

    <!--========================================================================================-->
    <!--삭제처리 및 수정 값 불러오기-->
    <script>
        function selectOption() {
            if (document.getElementById('actionSelect').value === 'deleteProc') {
                if (confirm('삭제하시겠습니까?')) {
                    document.getElementById('selectOfDelete').action = "/operationBoardComment/deleteProc";
                    document.getElementById('selectOfDelete').method = "post";
                    document.getElementById('selectOfDelete').submit();
                }
                 document.getElementById('actionSelect').value = "";
            }

             if (document.getElementById('actionSelect').value === 'updateProc') {
                document.getElementById('selectOfDelete').action = "/operationBoardComment/update";
                document.getElementById('selectOfDelete').method = "post";
                document.getElementById('selectOfDelete').submit();
            }
        }
    </script>

    <!--수정 처리-->
    <script>
        function updateComment() {
            if (document.updateComment.content.value.trim() === '') {
                alert('내용을 입력해주세요');
                document.updateComment.content.focus();
                return;
            }

            if (confirm('수정하시겠습니까?')) {
                document.getElementById('selectOfUpdate').action = "/operationBoardComment/updateProc";
                document.getElementById('selectOfUpdate').method = "post";
                document.getElementById('selectOfUpdate').submit();
            }
        }
    </script>

<!--    <script>
        function updateComment() {
            if (confirm('수정하시겠습니까?')) {
                document.getElementById('selectOfDelOrUp').action = "/operationBoardComment/updateProc";
                document.getElementById('selectOfDelOrUp').method = "post";
                document.getElementById('selectOfDelOrUp').submit();
            }
            document.getElementById('actionSelect').value = "";
        }
    </script>-->
    <!--========================================================================================-->

    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
