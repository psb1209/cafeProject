<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <h2>글 쓰기</h2>

    <form name="DirForm" id="DirForm" th:action="@{/operationBoard/createProc}" th:method="post">

        <!--<input type="hidden" name="_csrf" th:value="${_csrf.token}">-->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /> <!--정상적으로 넘어왔는지 확인-->

        <div class="mb-3 mt-3">
            <label for="subject"> 제목:</label>
            <input type="text" class="form-control" id="subject" placeholder="Enter subject" name="subject">
        </div>

        <div class="mb-3">
            <label for="content">내용:</label>
            <textarea class="form-control" id="content" placeholder="Enter content" name="content"></textarea>
        </div>

        <button type="button" id="btn-save" row="10" class="btn btn-secondary" onclick="save();">글 추가</button>

    </form>

    <script>
        function save() {
            // 간단한 클라이언트 측 유효성 검사
            if (document.DirForm.subject.value.trim() === '') {
                alert('제목을 입력해주세요');
                document.DirForm.subject.focus();
                return;
            }
            if (document.DirForm.content.value.trim() === '') {
                alert('내용을 입력해주세요');
                document.DirForm.content.focus();
                return;
            }

            if (confirm('추가하시겠습니까?')) {
                document.getElementById('DirForm').submit();
            }
        }
    </script>

    <script>
        $(document).ready(function() {

            // CSRF META 태그에서 값 읽기
            let header = $("meta[name='_csrf_header']").attr("content");
            let token = $("meta[name='_csrf']").attr("content");

            // 모든 AJAX 요청마다 CSRF 자동 추가
            $.ajaxSetup({
                beforeSend: function(xhr) {
                    xhr.setRequestHeader(header, token);
                }
            });

            $("#content").summernote({
                height: 300,
                // (선택적) Summernote 설정 보완
                lang: 'ko-KR', // 언어 설정
                placeholder: '여기에 내용을 작성하세요...',
                toolbar: [
                    ['style', ['style']],
                    ['font', ['bold', 'italic', 'underline', 'clear']],
                    ['para', ['ul', 'ol', 'paragraph']],
                    ['insert', ['link', 'picture']]
                ],
                callbacks: {
                    onImageUpload: function(files) {
                        uploadSummernoteImageFile(files[0], this);
                    }
                }
            });
        });

        function uploadSummernoteImageFile(file, editor) {
            let data = new FormData();
            data.append("file", file);

            $.ajax({
                url: "/operationBoard/uploadImage",   // 업로드 URL
                type: "POST",
                enctype: 'multipart/form-data',  // 첨부파일 사용 시 필수
                data: data,
                processData: false,
                contentType: false,
                success: function (response) {
                    // 업로드된 이미지 URL을 에디터에 삽입
                    $(editor).summernote('insertImage', response.url);
                },
                error: function() {
                    alert("이미지 업로드 실패");
                }
            });
        }
    </script>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
