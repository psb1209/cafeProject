<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns:sec="http://www.w3.org/1999/xhtml"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center',
               sidebarKey='cafe'">

<body>

<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">
    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <div class="page-container">

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title">운영 게시판</div>

                <div th:if="${msg}">
                    <span th:text="${msg}">메시지내용</span>
                </div>

                <!--사용자가 게시글의 정렬조건 선택-->
                <div class="cafe-article-actions">
                    <select onchange="location.href='?page=0&sort=' + this.value" class="cafe-action-btn write">
                        <option value="createDate,desc" th:selected="${param.sort != null and param.sort[0] == 'createDate,desc'}" class="cafe-action-btn write">최근 등록일 순</option>
                        <option value="createDate,asc" th:selected="${param.sort != null and param.sort[0] == 'createDate,asc'}" class="cafe-action-btn write">오래된 순</option>
                        <option value="cnt,desc" th:selected="${param.sort != null and param.sort[0] == 'cnt,desc'}" class="cafe-action-btn write">조회수 높은 순</option>
                        <option value="cnt,asc" th:selected="${param.sort != null and param.sort[0] == 'cnt,asc'}" class="cafe-action-btn write">조회수 낮은 순</option>
                    </select>

                    <!--사용자에게 목록에 보여질 갯수 선택-->
                    <select onchange="location.href='?page=0&size=' + this.value" class="cafe-action-btn write">
                        <option value="5" th:selected="${operationBoardList.size == 5}" class="cafe-action-btn write">5개씩 보기</option>
                        <option value="10" th:selected="${operationBoardList.size == 10}" class="cafe-action-btn write">10개씩 보기</option>
                        <option value="15" th:selected="${operationBoardList.size == 15}" class="cafe-action-btn write">15개씩 보기</option>
                        <option value="20" th:selected="${operationBoardList.size == 20}" class="cafe-action-btn write">20개씩 보기</option>
                    </select>

                    <a sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')"
                       th:href="@{/operationBoard/create}"
                       class="cafe-action-btn write">
                        ✏️ 게시글 작성
                    </a>
                </div>
            </div>

            <div class="cafe-board-search">
                <form method="get" th:action="@{/operationBoard/list}" class="cafe-search-form">
                    <input type="search" name="keyword" placeholder="게시판 검색" th:value="${keyword}">
                    <input type="hidden" name="size" value="15" th:selected="${operationBoardList.size == 15}">
                    <button type="submit">🔍</button>
                </form>
            </div>

            <div th:if="${(operationBoardList == null or operationBoardList.isEmpty()) and (subNoticeList == null or subNoticeList.isEmpty())}"
                 class="text-center" style="padding:40px; color:#888;">
                등록된 게시글이 없습니다.
            </div>

            <table class="cafe-board-table"
                   th:if="${(subNoticeList != null and !subNoticeList.isEmpty()) or (operationBoardList != null and !operationBoardList.isEmpty())}">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject text-center">제목</th>
                    <th class="col-cnt">조회수</th>
                    <th class="col-writer">작성자</th>
                    <th class="col-writer">회원등급</th>
                    <th class="col-date">작성일</th>
                </tr>
                </thead>

                <!-- 📢 공지글 영역 -->
                <tbody th:if="${subNoticeList != null and !subNoticeList.isEmpty() and operationBoardList.number == 0}">
                <!--====================================================== 검색 기능 변경사항!! =======================================================-->
                <!--
                        th:if="${#strings.isEmpty(keyword) or #strings.containsIgnoreCase(subNotice.subject, keyword)}" = 공지글을 화면에 보여줄지 말지 결정하는 조건

                        #strings.isEmpty(keyword) = 검색어(keyword)가 없으면 공지글을 보여준다
                        #strings.containsIgnoreCase(subNotice.subject, keyword) = 검색어가 있으면 공지글 제목에 그 검색어가 들어 있을 때만 보여준다
                -->
                <tr class="notice-row"
                    th:each="subNotice : ${subNoticeList}"
                    th:if="${#strings.isEmpty(keyword) or #strings.containsIgnoreCase(subNotice.subject, keyword)}"
                    th:onclick="|location.href='@{|/operationBoard/view/${subNotice.id}|}'|">
                    <!--====================================================== 검색 기능 변경사항!! =======================================================-->

                    <!-- 순번 대신 공지 -->
                    <td class="text-danger fw-bold text-center">공지</td>

                    <td>
                        📢 <span th:text="${subNotice.subject}"></span>
                        <!--고정 공지 게시글 제목 옆 댓글수 표시-->
                        <span class="text-danger small ms-2"
                              th:if="${#lists.size(subNotice.commentList) > 0}"
                              th:text="|[${#lists.size(subNotice.commentList)}]|">
                        </span>

                        <form th:if="${#authorization.expression('hasAnyRole(''ROLE_ADMIN'',''ROLE_MANAGER'')')}"
                              th:action="@{/operationBoard/toggleNotice/{id}(id=${subNotice.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="notice-btn">공지해제</button>
                        </form>
                    </td>

                    <!-- 조회수 -->
                    <td class="td_underline" th:text="${viewCntMap[subNotice.id]}"></td>

                    <!-- 작성자 -->
                    <td class="td_underline" th:text="${subNotice.member.username}"></td>

                    <!-- 등급 -->
                    <td class="td_underline text-center">운영진</td>

                    <!-- 날짜 -->
                    <td class="td_underline text-center"
                        th:text="${#dates.format(subNotice.createDate, 'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>
                <!--====================================================== 공지글!! =======================================================-->
                <tbody>
                <!--====================================================== 검색 기능 변경사항!! =======================================================-->
                <!--
                        기존 tr태그
                        <tr th:each="operationBoard, loop : ${operationBoardList}"
                            th:onclick="|location.href='@{|/operationBoard/view/${operationBoard.id}|}'|">

                            operationBoardList에는 공지글과 일반글 둘 다 포함이 되어있음
                            th:if="${!operationBoard.subNotice} 이 조건을 넣어줌으로써 일반글과 공지글 분리

                            기존:
                             박스 A(공지)
                             박스 B(전체)
                              ㄴ공지 물건이 A에도 있고 B에도 있음

                            변경 후:
                             박스 A(공지)
                             박스 B(일반만)
                              ㄴ 역할 분리 완성
                -->
                <tr th:each="operationBoard, loop : ${operationBoardList}"
                    th:if="${!operationBoard.subNotice}"
                    th:onclick="|location.href='@{|/operationBoard/view/${operationBoard.id}|}'|">
                    <!--====================================================== 검색 기능 변경사항!! =======================================================-->

                    <td class="td_underline"
                        th:text="${operationBoardList.number * operationBoardList.size + loop.index + 1}"></td>
                    <td>
                        <span th:text="${operationBoard.subject}" class="col-subject" style="text-align: left;"></span>
                        <!--게시글 제목 옆 댓글수 표시-->
                        <span class="text-danger small ms-2"
                              th:if="${#lists.size(operationBoard.commentList) > 0}"
                              th:text="|[${#lists.size(operationBoard.commentList)}]|">
                            </span>
                        <!--====================================================== 공지글!! =======================================================-->
                        <!-- 관리자/매니저만 -->
                        <form th:if="${#authorization.expression('hasAnyRole(''ROLE_ADMIN'',''ROLE_MANAGER'')')}"
                              th:action="@{/operationBoard/toggleNotice/{id}(id=${operationBoard.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="notice-btn">공지등록</button>
                        </form>
                        <!--====================================================== 공지글!! =======================================================-->
                    </td>
                    <td class="td_underline" th:text="${viewCntMap[operationBoard.id]}"></td>
                    <td class="td_underline" th:text="${operationBoard.member.username}"></td>
                    <td class="td_underline text-center" th:switch="${operationBoard.member.grade.name()}">
                        <span th:case="'USER'">일반🥉</span>
                        <span th:case="'REGULAR'">성실🥈</span>
                        <span th:case="'BEST'">우수🥇</span>
                        <span th:case="'SPECIAL'">최우수🏆</span>
                    </td>
                    <td class="td_underline text-center"
                        th:text="${#dates.format(operationBoard.createDate, 'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>
            </table>

            <!-- 게시글 페이징 -->
            <div class="cafe-pagination" th:if="${operationBoardList != null and !operationBoardList.isEmpty()}">

                <!-- 이전 버튼 -->
                <a class="page-btn"
                   th:classappend="${operationBoardList != null and operationBoardList.first} ? ' disabled'"
                   th:href="@{|/operationBoard/list?page=${operationBoardList.number - 1}|}">이전</a>

                <!-- 페이지 번호 버튼: 현재 페이지 기준 +-2 -->
                <th:block th:with="
                            startPage=${operationBoardList.number - 2 > 0 ? operationBoardList.number - 2 : 0},
                            endPage=${operationBoardList.number + 2 < operationBoardList.totalPages - 1 ? operationBoardList.number + 2 : operationBoardList.totalPages - 1}">

                    <a class="page-btn"
                       th:each="page : ${#numbers.sequence(startPage, endPage)}"
                       th:text="${page + 1}"
                       th:classappend="${page == operationBoardList.number} ? ' active'"
                       th:href="@{|/operationBoard/list?page=${page}|}"></a>
                </th:block>

                <!-- 다음 버튼 -->
                <a class="page-btn"
                   th:classappend="${operationBoardList.last} ? ' disabled'"
                   th:href="@{|/operationBoard/list?page=${operationBoardList.number + 1}|}">다음</a>
            </div>
        </div>
    </div>
</div>

<script th:if="${operationBoardList != null and operationBoardList.isEmpty()}">
    alert([[${errMsg}]]);
</script>

</body>
</html>
