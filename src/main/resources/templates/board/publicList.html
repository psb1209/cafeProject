<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=${#strings.isEmpty(cafe?.imgName)}
                         ? @{/assets/img/post-sample-image.jpg}
                         : @{|${imageUrlPrefix}${cafe.imgName}|},
               headerPosition='center center',
               sidebarKey='custom'">
<body>

<h1 layout:fragment="pageTitle"
    th:text="${cafe?.name} ?: 'My Cafe'"
    th:onclick="${cafe != null}
                ? |location.href='@{/cafe/{cafeCode}(cafeCode=${cafe.code})}'|
                : |location.href='/'|"
    style="cursor: pointer;">카페 이름</h1>

<span layout:fragment="pageSubTitle"
      th:with="desc=${cafe?.description == null ? null : cafe.description.trim().replace('\r','')}"
      th:text="${#strings.isEmpty(desc) ? 'description' : desc.split('\n')[0]}">
    카페 설명
</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <!-- 검색 -->
    <div class="cafe-board-search">
        <form class="cafe-search-form"
              method="get"
              th:action="@{/cafe/{cafeCode}/board/list(cafeCode=${cafeCode})}">
            <input type="search"
                   name="keyword"
                   placeholder="게시판 검색"
                   th:value="${keyword}">
            <button type="submit">🔍</button>
        </form>
    </div>

    <!-- 게시판 카드 영역 -->
    <div class="cafe-board-wrap">

        <!-- 카드형 게시판 (CSS 미정 영역 → 구조 유지) -->
        <div class="board-grid">
            <a class="board-tile"
               th:each="data : ${list.content}"
               th:href="@{/cafe/{cafeCode}/board/{code}(cafeCode=${cafeCode}, code=${data.code})}">

                <div class="board-thumb" style="max-height:150px;">
                    <img th:src="${#strings.isEmpty(data.imgName)}
                                 ? @{/assets/img/post-sample-image.jpg}
                                 : @{|${imageUrlPrefix}${data.imgName}|}"
                         loading="lazy">
                </div>

                <div class="board-title" th:text="${data.name}"></div>
            </a>
        </div>

        <!-- 비었을 때 -->
        <div th:if="${#lists.isEmpty(list.content)}"
             class="text-center mt-3" style="padding: 40px;">
            <div th:text="${#strings.isEmpty(keyword)
                          ? '확인 가능한 게시판이 없습니다.'
                          : '검색 결과가 없습니다.'}" class="text-center">
            </div>
        </div>

        <!-- 페이지네이션 -->
        <div class="cafe-pagination" th:if="${list.totalPages > 0}">
            <a class="page-btn"
               th:classappend="${list.first} ? 'disabled'"
               th:href="${list.first} ? '#'
                        : @{/cafe/{cafeCode}/board/list(cafeCode=${cafeCode}, page=${list.number-1}, keyword=${keyword})}">
                이전
            </a>

            <a class="page-btn"
               th:each="page : ${#numbers.sequence(0, list.totalPages-1)}"
               th:if="${page >= (list.number/5)*5 and page <= (list.number/5)*5 + 4}"
               th:classappend="${page == list.number} ? 'active'"
               th:text="${page + 1}"
               th:href="@{/cafe/{cafeCode}/board/list(cafeCode=${cafeCode}, page=${page}, keyword=${keyword})}">
            </a>

            <a class="page-btn"
               th:classappend="${list.last} ? 'disabled'"
               th:href="${list.last} ? '#'
                        : @{/cafe/{cafeCode}/board/list(cafeCode=${cafeCode}, page=${list.number+1}, keyword=${keyword})}">
                다음
            </a>
        </div>

    </div>
</div>


</body>
</html>
