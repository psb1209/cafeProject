<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle">My Cafe</h1>
<span layout:fragment="pageSubTitle">first page</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <div class="board-grid">
        <a class="board-tile"
           th:each="data : ${list.content}"
           th:href="@{|/board/${data.code}|}">

            <div class="board-thumb">
                <img th:src="${#strings.isEmpty(data.imgName)}
                             ? @{/assets/img/post-sample-image.jpg}
                             : @{|${imageUrlPrefix}${data.imgName}|}"
                     alt=""
                     loading="lazy">
            </div>

            <div class="board-title" th:text="${data.name}">게시판명</div>
        </a>
    </div>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
