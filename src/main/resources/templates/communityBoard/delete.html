<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">

<body>

<h1 layout:fragment="pageTitle">My Cafe</h1>
<span layout:fragment="pageSubTitle">first page</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <h2>자유게시판 삭제</h2>
    <form name="form">
        <input type="text" name="id" th:value="${communityBoard.id}">
        <div class="mb-3 mt-3">
            <label for="subject">subject:</label>
            <span class="form-control" id="subject"  name="subject" th:text="${communityBoard.subject}"></span>
        </div>
        <div class="mb-3">
            <label for="content">content:</label>
            <span class="form-control" id="content" name="content" th:text="${communityBoard.content}"></span>
        </div>


        <button type="button" class="btn btn-secondary" onclick="save();">게시글삭제</button>
    </form>

    <script>
        function save() {
            if (confirm('삭제할까요?')) {
                document.form.action = "/communityBoard/deleteProc";
                document.form.method = "post";
                document.form.submit();
            }
        }
    </script>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
