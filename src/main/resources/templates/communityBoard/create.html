<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">

<body>

<h1 layout:fragment="pageTitle">My Cafe</h1>
<span layout:fragment="pageSubTitle">first page</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <h2>자유게시판 등록</h2>
    <form name="form">
        <div class="mb-3 mt-3">
            <label for="subject">subject:</label>
            <input type="text" class="form-control" id="subject" placeholder="Enter subject" name="subject">
        </div>
        <div class="mb-3">
            <label for="content">content:</label>
            <input type="text" class="form-control" id="content" placeholder="Enter content" name="content">
        </div>


        <button type="button" class="btn btn-secondary" onclick="save();">게시글등록</button>
    </form>

    <script>
        function save() {
            if (confirm('등록할까요?')) {
                document.form.action = "/communityBoard/createProc";
                document.form.method = "post";
                document.form.submit();
            }
        }
    </script>

    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
