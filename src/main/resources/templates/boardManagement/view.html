<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns:sec="http://www.w3.org/1999/xhtml"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center',
               sidebarKey='admin'">
<body>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/admin.css}" rel="stylesheet" />

    <!-- ================= 상단 헤더 ================= -->
    <div class="board-detail-header">
        <div class="board-title-wrap">
            <h2 th:text="${data.name}">게시판 이름</h2>

            <span class="board-status active"
                  th:if="${data.enabled}">ACTIVE</span>
            <span class="board-status inactive"
                  th:unless="${data.enabled}">INACTIVE</span>
        </div>

        <div class="cafe-article-actions">
            <a th:href="@{/boardManagement/list}" class="cafe-action-btn">목록</a>
            <a th:href="@{|/boardManagement/update/${data.id}|}"
               class="cafe-action-btn">수정</a>
        </div>
    </div>

    <!-- ================= 본문 ================= -->
    <div class="write-page">

        <!-- ===== 왼쪽 영역 ===== -->
        <div style="flex:1; min-width:300px;">

            <!-- 기본 정보 -->
            <div class="write-card main">
                <div class="write-header">기본 정보</div>

                <div class="write-group">
                    <span class="member-view-label">게시판 코드</span>

                    <div style="display:flex; gap:8px;">
                        <input id="boardCode"
                               class="member-view-box"
                               th:value="${data.code}"
                               readonly>

                        <button class="write-btn"
                                type="button"
                                onclick="copyFromId('boardCode')">
                            복사
                        </button>
                    </div>

                    <a class="cafe-more-btn"
                       style="margin-top:8px; display:inline-block;"
                       th:href="@{|/board/${data.code}|}"
                       target="_blank">
                    <span class="more-text">
                        공개 링크로 열기 (/board/<span th:text="${data.code}"></span>)
                    </span>
                        <span class="arrow">→</span>
                    </a>
                </div>

                <div class="write-group">
                    <span class="member-view-label">게시판 설명</span>

                    <pre class="board-desc"
                         th:text="${data.description}">
                        설명
                    </pre>
                </div>
            </div>

            <!-- 권한 / 상태 -->
            <div class="write-card sub">
                <div class="write-header">권한 / 상태</div>

                <div class="member-view-group">
                    <span class="member-view-label">보기 권한</span>
                    <div class="member-view-box"
                         th:text="${data.readRole}">
                        USER
                    </div>
                </div>

                <div class="member-view-group">
                    <span class="member-view-label">작성 권한</span>
                    <div class="member-view-box"
                         th:text="${data.writeRole}">
                        USER
                    </div>
                </div>

                <div class="member-view-group">
                    <span class="member-view-label">활성 상태</span>
                    <div class="member-view-box"
                         th:text="${data.enabled} ? '활성' : '비활성'">
                        활성
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 오른쪽 영역 ===== -->
        <div class="write-side">

            <!-- 대표 이미지 -->
            <div class="write-card sub">
                <div class="write-header">대표 이미지</div>

                <div th:if="${data.imgName != null && !#strings.isEmpty(data.imgName)}">
                    <img class="member-view-box"
                         style="padding:0; max-width:100%; height:auto; display:block;"
                         th:src="@{|${imageUrlPrefix}${data.imgName}|}"
                         th:alt="${data.name}"
                         loading="lazy">

                    <div class="member-view-label" style="margin-top:8px;">
                        파일명:
                        <span th:text="${data.imgName}">img.jpg</span>
                    </div>
                </div>

                <div th:unless="${data.imgName != null && !#strings.isEmpty(data.imgName)}"
                     class="member-view-box">
                    등록된 대표 이미지가 없습니다.
                </div>
            </div>

            <!-- 메타 정보 -->
            <div class="write-card sub">
                <div class="write-header">메타 정보</div>

                <div class="member-view-group">
                    <span class="member-view-label">ID</span>
                    <div class="member-view-box"
                         th:text="${data.id}">
                        1
                    </div>
                </div>

                <div class="member-view-group">
                    <span class="member-view-label">생성일</span>
                    <div class="member-view-box"
                         th:text="${data.createDate != null}
                     ? ${#dates.format(data.createDate, 'yyyy-MM-dd HH:mm:ss')}
                     : '-'">
                        날짜
                    </div>
                </div>

                <div class="member-view-group">
                    <span class="member-view-label">작성자</span>
                    <div class="member-view-box"
                         th:text="${data.username != null ? data.username : '-'}">
                        admin
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- 페이지 전용 스크립트 -->
<script layout:fragment="script">
    function copyFromId(inputId) {
        const el = document.getElementById(inputId);
        if (!el) return;

        el.select();
        el.setSelectionRange(0, 99999);

        // 최신 브라우저 우선
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(el.value);
        } else {
            // fallback
            document.execCommand("copy");
        }
    }
</script>

</body>
</html>
