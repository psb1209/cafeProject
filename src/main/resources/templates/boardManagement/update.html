<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns:sec="http://www.w3.org/1999/xhtml"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center',
               sidebarKey='admin'">
<body>

<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/admin.css}" rel="stylesheet" />

        <div class="write-card medium">
            <div class="write-header">게시판 수정</div>

            <form id="form"
                  th:action="@{/boardManagement/updateProc}"
                  method="post"
                  th:object="${data}">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" name="imgName" id="imgName" th:value="*{imgName}">

                <!-- 게시판 이름 -->
                <div class="write-group">
                    <label class="write-label">게시판 이름</label>
                    <input type="text"
                           class="write-title-input"
                           th:field="*{name}"
                           disabled>
                </div>

                <!-- 게시판 설명 -->
                <div class="write-group">
                    <label class="write-label">게시판 설명</label>
                    <textarea rows="8"
                              class="cafe-comment-textarea"
                              th:field="*{description}"
                              placeholder="게시판 설명을 입력해주세요."
                              required></textarea>
                </div>

                <hr>

                <!-- 활성 상태 -->
                <div class="write-group">
                    <label class="write-label">활성 상태</label>

                    <label>
                        <input type="radio" th:field="*{enabled}" value="true"> 활성
                    </label>
                    &nbsp;&nbsp;
                    <label>
                        <input type="radio" th:field="*{enabled}" value="false"> 비활성
                    </label>
                </div>

                <!-- 대표 이미지 -->
                <div class="write-group">
                    <label class="write-label">대표 이미지</label>
                    <input type="file" id="imgFile">

                    <img id="imagePreview"
                         class="mt-2 border rounded"
                         style="max-width:200px; display:none;">
                </div>

                <!-- 쓰기 권한 -->
                <div class="write-group">
                    <label class="write-label">쓰기 권한</label>
                    <select class="write-title-input"
                            th:field="*{writeRole}">
                        <option th:each="r : ${writeRoles}"
                                th:value="${r}"
                                th:text="${r}"></option>
                    </select>
                </div>

                <!-- 보기 권한 -->
                <div class="write-group">
                    <label class="write-label">보기 권한</label>
                    <select class="write-title-input"
                            th:field="*{readRole}">
                        <option th:each="r : ${readRoles}"
                                th:value="${r}"
                                th:text="${r}"></option>
                    </select>
                </div>

                <!-- 버튼 -->
                <div class="write-action-bar">
                    <button type="button"
                            class="write-btn primary"
                            onclick="save();">
                        수정사항 저장
                    </button>
                    <a class="cafe-action-btn"
                       th:href="@{/boardManagement/list}">
                        목록
                    </a>
                </div>

            </form>
        </div>
    </div>


    <script>
        function save() {
            if (confirm('수정하시겠습니까?')) {
                document.getElementById('form').submit();
            }
        }
    </script>

    <script th:inline="javascript">
        $(document).ready(function () {

            // 기존 이미지가 있으면 초기 프리뷰 세팅
            const existingImgName = $("#imgName").val();
            if (existingImgName) {
              const prefix = /*[[${imageUrlPrefix}]]*/ "";
              $("#imagePreview").attr("src", prefix + existingImgName).show();
            }

            // CSRF (meta 태그가 있어야 함)
            const header = $("meta[name='_csrf_header']").attr("content");
            const token  = $("meta[name='_csrf']").attr("content");

            const $btnSave = $("#btn-save");

            $("#imgFile").on("change", function () {
                const file = this.files && this.files[0];
                if (!file) return;

                if (!file.type.startsWith("image/")) {
                    alert("이미지 파일만 업로드할 수 있습니다.");
                    this.value = "";
                    return;
                }

                const fd = new FormData();
                fd.append("file", file);

                $btnSave.prop("disabled", true);

                $.ajax({
                    url: "/boardManagement/uploadImage",
                    type: "POST",
                    data: fd,
                    processData: false,
                    contentType: false,
                    dataType: "json",
                    beforeSend: function (xhr) {
                        if (header && token) xhr.setRequestHeader(header, token);
                    },
                    success: function (res) {
                        $("#imgName").val(res.fileName);
                        $("#imagePreview").attr("src", res.url).show();
                    },
                    error: function (xhr) {
                        alert("대표 이미지 업로드 실패 (" + xhr.status + ")");
                        // 수정 페이지에서는 실패해도 기존 이미지가 있을 수 있으니 imgName을 비우지 않는 편이 안전할 수도 있음
                        // 필요하면 아래 줄을 주석 해제/유지 선택
                        // $("#imgName").val("");
                    },
                    complete: function () {
                        $btnSave.prop("disabled", false);
                    }
                });
            });
        });
    </script>

</div>

</body>
</html>
