<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="showHeader=false">
<body>

<div layout:fragment="content" class="container mt-4">

    <h2 class="mb-3">게시판 수정</h2>

    <form name="form"
          id="form"
          th:action="@{/boardManagement/updateProc}"
          method="post"
          th:object="${data}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <input type="hidden" th:field="*{id}">
        <input type="hidden" name="imgName" id="imgName" th:value="*{imgName}">

        <!-- 게시판 이름 -->
        <div class="mb-3">
            <label for="name" class="form-label">게시판 이름</label>
            <input type="text"
                   class="form-control"
                   th:field="*{name}"
                   id="name"
                   disabled>
        </div>

        <!-- 게시판 설명 -->
        <div class="mb-3">
            <label for="description" class="form-label">게시판 설명</label>
            <textarea rows="8"
                      class="form-control"
                      th:field="*{description}"
                      th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"
                      id="description"
                      placeholder="게시판 설명을 입력해주세요."
                      required></textarea>
            <div class="invalid-feedback d-block"
                 th:if="${#fields.hasErrors('description')}"
                 th:errors="*{description}"></div>
        </div>

        <!-- 활성/비활성 -->
        <div class="mb-3">
            <label class="form-label d-block">활성 상태</label>
            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       th:field="*{enabled}"
                       id="enabledTrue"
                       value="true"
                       required>
                <label class="form-check-label" for="enabledTrue">활성</label>
            </div>
            <div class="form-check">
                <input class="form-check-input"
                       type="radio"
                       th:field="*{enabled}"
                       id="enabledFalse"
                       value="false"
                       required>
                <label class="form-check-label" for="enabledFalse">비활성</label>
            </div>
        </div>

        <!-- 대표 이미지 -->
        <div class="mb-3">
            <label for="imgFile" class="form-label">대표 이미지</label>
            <input type="file" class="form-control" id="imgFile" accept="image/*">

            <img id="imagePreview"
                 class="mt-2 border rounded"
                 style="max-width:200px; display:none;"
                 alt="대표 이미지 미리보기"
                 loading="lazy">

            <div class="form-text mt-2" th:if="*{imgName != null && !#strings.isEmpty(imgName)}">
                현재 이미지: <span th:text="*{imgName}">img.jpg</span>
            </div>
        </div>

        <!-- 쓰기 권한 -->
        <div class="mb-3">
            <label for="writeRole" class="form-label">쓰기 권한 (Write Role)</label>
            <select class="form-select"
                    th:field="*{writeRole}"
                    th:classappend="${#fields.hasErrors('writeRole')} ? ' is-invalid'"
                    id="writeRole">
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
            </select>
            <div class="invalid-feedback d-block"
                 th:if="${#fields.hasErrors('writeRole')}"
                 th:errors="*{writeRole}"></div>
        </div>

        <!-- 보기 권한 -->
        <div class="mb-3">
            <label for="readRole" class="form-label">보기 권한 (Read Role)</label>
            <select class="form-select"
                    th:field="*{readRole}"
                    th:classappend="${#fields.hasErrors('readRole')} ? ' is-invalid'"
                    id="readRole">
                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
            </select>
            <div class="invalid-feedback d-block"
                 th:if="${#fields.hasErrors('readRole')}"
                 th:errors="*{readRole}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="button" id="btn-save" class="btn btn-primary" onclick="save();">
                수정사항 저장
            </button>
            <a class="btn btn-outline-secondary" th:href="@{/boardManagement/list}">목록</a>
        </div>
    </form>

    <script>
        function save() {
            if (confirm('수정하시겠습니까?')) {
                document.getElementById('form').submit();
            }
        }
    </script>

    <script th:inline="javascript">
        $(document).ready(function () {

            // 기존 이미지가 있으면 초기 프리뷰 세팅
            const existingImgName = $("#imgName").val();
            if (existingImgName) {
              const prefix = /*[[${imageUrlPrefix}]]*/ "";
              $("#imagePreview").attr("src", prefix + existingImgName).show();
            }

            // CSRF (meta 태그가 있어야 함)
            const header = $("meta[name='_csrf_header']").attr("content");
            const token  = $("meta[name='_csrf']").attr("content");

            const $btnSave = $("#btn-save");

            $("#imgFile").on("change", function () {
                const file = this.files && this.files[0];
                if (!file) return;

                if (!file.type.startsWith("image/")) {
                    alert("이미지 파일만 업로드할 수 있습니다.");
                    this.value = "";
                    return;
                }

                const fd = new FormData();
                fd.append("file", file);

                $btnSave.prop("disabled", true);

                $.ajax({
                    url: "/boardManagement/uploadImage",
                    type: "POST",
                    data: fd,
                    processData: false,
                    contentType: false,
                    dataType: "json",
                    beforeSend: function (xhr) {
                        if (header && token) xhr.setRequestHeader(header, token);
                    },
                    success: function (res) {
                        $("#imgName").val(res.fileName);
                        $("#imagePreview").attr("src", res.url).show();
                    },
                    error: function (xhr) {
                        alert("대표 이미지 업로드 실패 (" + xhr.status + ")");
                        // 수정 페이지에서는 실패해도 기존 이미지가 있을 수 있으니 imgName을 비우지 않는 편이 안전할 수도 있음
                        // 필요하면 아래 줄을 주석 해제/유지 선택
                        // $("#imgName").val("");
                    },
                    complete: function () {
                        $btnSave.prop("disabled", false);
                    }
                });
            });
        });
    </script>

</div>

</body>
</html>
