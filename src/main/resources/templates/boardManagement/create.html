<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns:sec="http://www.w3.org/1999/xhtml"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center',
               sidebarKey='cafe'">
<body>
<h1 layout:fragment="pageTitle">게시판 생성</h1>
<span layout:fragment="pageSubTitle"></span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->

    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <div class="write-page">
        <div class="write-card medium">

            <h2 class="write-header">게시판 생성</h2>

            <form id="form"
                  th:action="@{/boardManagement/createProc}"
                  method="post"
                  th:object="${data}">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="imgName" id="imgName">

                <!-- 게시판 이름 -->
                <div class="write-group">
                    <label for="name" class="write-label">게시판 이름</label>
                    <input type="text"
                           id="name"
                           th:field="*{name}"
                           placeholder="게시판 이름을 입력해주세요."
                           class="write-title-input"
                           th:classappend="${#fields.hasErrors('name')} ? ' error'"
                           required>
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>
                </div>

                <!-- 게시판 설명 -->
                <div class="write-group">
                    <label for="description" class="write-label">게시판 설명</label>
                    <input type="text"
                           id="description"
                           th:field="*{description}"
                           placeholder="게시판 설명을 입력해주세요."
                           class="write-title-input"
                           th:classappend="${#fields.hasErrors('description')} ? ' error'"
                           required>
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}">
                    </div>
                </div>

                <!-- 링크 코드 -->
                <div class="write-group">
                    <label for="code" class="write-label">설정할 링크</label>
                    <input type="text"
                           id="code"
                           th:field="*{code}"
                           placeholder="게시판 링크를 입력해주세요."
                           class="write-title-input"
                           th:classappend="${#fields.hasErrors('code')} ? ' error'"
                           required>
                    <div class="invalid-feedback d-block"
                         th:if="${#fields.hasErrors('code')}"
                         th:errors="*{code}">
                    </div>
                </div>

                <!-- 대표 이미지 -->
                <div class="write-group">
                    <label for="imgFile" class="write-label">대표 이미지</label>
                    <input type="file" id="imgFile" accept="image/*">
                    <img id="imagePreview"
                         style="max-width:200px; display:none; margin-top:8px;">
                </div>

                <!-- 쓰기 권한 -->
                <div class="write-group">
                    <label for="writeRole" class="write-label">쓰기 권한</label>
                    <select id="writeRole"
                            th:field="*{writeRole}"
                            class="write-title-input"
                            th:classappend="${#fields.hasErrors('writeRole')} ? ' error'">
                        <option th:each="r : ${writeRoles}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>
                    </select>
                </div>

                <!-- 읽기 권한 -->
                <div class="write-group">
                    <label for="readRole" class="write-label">보기 권한</label>
                    <select id="readRole"
                            th:field="*{readRole}"
                            class="write-title-input"
                            th:classappend="${#fields.hasErrors('readRole')} ? ' error'">
                        <option th:each="r : ${readRoles}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>
                    </select>
                </div>

                <!-- 버튼 -->
                <div class="write-action-bar">
                    <button type="button"
                            id="btn-save"
                            class="write-btn primary"
                            onclick="save();">
                        게시판 생성
                    </button>
                </div>

            </form>
        </div>
    </div>


    <script>
        function save() {
            if (confirm('추가하시겠습니까?')) {
                document.getElementById('form').submit();
            }
        }
    </script>
    <script>
        $(document).ready(function () {

          // CSRF (meta 태그가 있어야 함)
          const header = $("meta[name='_csrf_header']").attr("content");
          const token  = $("meta[name='_csrf']").attr("content");

          const $btnSave = $("#btn-save");

          $("#imgFile").on("change", function () {
            const file = this.files && this.files[0];
            if (!file) return;

            if (!file.type.startsWith("image/")) {
              alert("이미지 파일만 업로드할 수 있습니다.");
              this.value = "";
              return;
            }

            const fd = new FormData();
            fd.append("file", file);

            // 업로드 시작: 저장 버튼 비활성화
            $btnSave.prop("disabled", true);

            $.ajax({
              url: "/boardManagement/uploadImage",
              type: "POST",
              data: fd,
              processData: false,
              contentType: false,
              dataType: "json",
              beforeSend: function (xhr) {
                if (header && token) xhr.setRequestHeader(header, token);
              },
              success: function (res) {
                $("#imgName").val(res.fileName);
                $("#imagePreview").attr("src", res.url).show();
              },
              error: function (xhr) {
                alert("대표 이미지 업로드 실패 (" + xhr.status + ")");
                $("#imgName").val("");
                $("#imagePreview").hide();
              },
              complete: function () {
                // 업로드 종료(성공/실패 상관없이): 저장 버튼 다시 활성화
                $btnSave.prop("disabled", false);
              }
            });
          });
        });
    </script>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
