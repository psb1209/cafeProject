<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->

    <h2>삭제</h2>

    <form name="DirForm" id="DirForm" th:action="@{/operationBoard/deleteProc}" th:method="post">

        <!--<input type="hidden" name="_csrf" th:value="${_csrf.token}">-->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div style="display:none;">
            <input type="text" name="id" th:value="${operationBoard.id}">
        </div>

        <div class="mb-3 mt-3">
            <label for="subject">제목:</label>
            <input type="text" class="form-control" id="subject" placeholder="Enter subject" name="subject" th:value="${operationBoard.subject}">
        </div>

        <div class="mb-3">
            <label for="content">내용:</label>
            <textarea class="form-control" id="content" placeholder="Enter content" name="content" th:utext="${operationBoard.content}"></textarea>
        </div>

        <button type="button" id="btn-save" class="btn btn-secondary" onclick="save();">삭제</button>
    </form>

    <script>
        function save() {
        if (confirm('삭제하시겠습니까?')) {
            document.getElementById('DirForm').submit();
        }
    }
    </script>

    <script>
        $(document).ready(function() {
            $("#content").summernote({
                height: 300,
                lang: 'ko-KR'
            });
       });
    </script>

    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
