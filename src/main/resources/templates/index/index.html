<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center',
               sidebarKey='cafe'">

<body>

<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet"/>

    <div class="page-container">

        <!-- ============================== 공지사항 ============================== -->

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title" onclick="location.href='/noticeBoard/list'" style="cursor:pointer;">
                    📢공지사항
                </div>
                <a href="/noticeBoard/list" class="cafe-more-btn">
                    <span class="more-text">더보기</span><span class="arrow">›</span>
                </a>
            </div>

            <div th:if="${(noticeBoardList == null or noticeBoardList.isEmpty()) and (subNoticeBoardNoticeList == null or subNoticeBoardNoticeList.isEmpty())}"
                 class="text-center" style="padding:40px; color:#888;">
                등록된 게시글이 없습니다.
            </div>

            <table class="cafe-board-table"
                   th:if="${(subNoticeBoardNoticeList != null and !subNoticeBoardNoticeList.isEmpty()) or (noticeBoardList != null and !noticeBoardList.isEmpty())}">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <!-- 📢 공지글 -->
                <tbody th:if="${subNoticeBoardNoticeList != null and !subNoticeBoardNoticeList.isEmpty()}">
                <tr class="notice-row"
                    th:each="notice : ${subNoticeBoardNoticeList}"
                    th:onclick="|location.href='@{|/noticeBoard/view/${notice.id}|}'|">

                    <td class="text-danger fw-bold text-center">공지</td>

                    <td class="col-subject">
                        📢
                        <span th:text="${#strings.length(notice.subject) > 10
                                        ? #strings.substring(notice.subject, 0, 10) + '...'
                                        : notice.subject}">
                        </span>
                        <span class="text-danger small ms-2"
                              th:if="${#lists.size(notice.commentList) > 0}"
                              th:text="|[${#lists.size(notice.commentList)}]|"></span>
                    </td>
                    <td class="col-writer text-center"
                        th:if="${notice.member?.role?.name() == 'ADMIN'
                        or notice.member?.role?.name() == 'MANAGER'}">
                        운영진👑
                    </td>

                    <td class="col-writer text-center"
                        th:unless="${notice.member?.role?.name() == 'ADMIN'
                        or notice.member?.role?.name() == 'MANAGER'}"
                        th:text="${#strings.abbreviate(notice.member?.username, 8)}">
                    </td>
                </tr>
                </tbody>

                <!-- 일반글 -->
                <tbody>
                <tr th:each="board, loop : ${noticeBoardList}"
                    class="text-center"
                    th:onclick="|location.href='@{|/noticeBoard/view/${board.id}|}'|">

                    <td th:text="${loop.index + 1}"></td>

                    <td class="col-subject"
                        th:text="${#strings.length(board.subject) > 10
                    ? #strings.substring(board.subject, 0, 10) + '...'
                    : board.subject}">
                    </td>

                    <td class="col-writer text-center"
                        th:if="${board.member?.role?.name() == 'ADMIN'
                        or board.member?.role?.name() == 'MANAGER'}">
                        운영진👑
                    </td>

                    <td class="col-writer text-center"
                        th:unless="${board.member?.role?.name() == 'ADMIN'
                        or board.member?.role?.name() == 'MANAGER'}"
                        th:text="${#strings.abbreviate(board.member?.username, 8)}">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ============================== 정보게시판 ============================== -->

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title" onclick="location.href='/informationBoard/list'" style="cursor:pointer;">
                    🔍정보게시판
                </div>
                <a href="/informationBoard/list" class="cafe-more-btn">
                    <span class="more-text">더보기</span><span class="arrow">›</span>
                </a>
            </div>

            <div th:if="${(informationBoardList == null or informationBoardList.isEmpty()) and (subInformationBoardNoticeList == null or subInformationBoardNoticeList.isEmpty())}"
                 class="text-center" style="padding:40px; color:#888;">
                등록된 게시글이 없습니다.
            </div>

            <table class="cafe-board-table"
                   th:if="${(subInformationBoardNoticeList != null and !subInformationBoardNoticeList.isEmpty()) or (informationBoardList != null and !informationBoardList.isEmpty())}">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <!-- 📢 공지글 -->
                <tbody th:if="${subInformationBoardNoticeList != null and !subInformationBoardNoticeList.isEmpty()}">
                <tr class="notice-row"
                    th:each="notice : ${subInformationBoardNoticeList}"
                    th:onclick="|location.href='@{|/informationBoard/view/${notice.id}|}'|">

                    <td class="text-danger fw-bold text-center">공지</td>

                    <td class="col-subject">
                        📢
                        <span th:text="${#strings.length(notice.subject) > 10
                              ? #strings.substring(notice.subject, 0, 10) + '...'
                              : notice.subject}">
                        </span>
                    </td>
                    <td class="col-writer text-center"
                        th:if="${notice.member?.role?.name() == 'ADMIN'
                        or notice.member?.role?.name() == 'MANAGER'}">
                        운영진👑
                    </td>

                    <td class="col-writer text-center"
                        th:unless="${notice.member?.role?.name() == 'ADMIN'
                        or notice.member?.role?.name() == 'MANAGER'}"
                        th:text="${#strings.abbreviate(notice.member?.username, 8)}">
                    </td>
                </tr>
                </tbody>

                <!-- 일반글 -->
                <tbody>
                <tr th:each="board, loop : ${informationBoardList}"
                    class="text-center"
                    th:onclick="|location.href='@{|/informationBoard/view/${board.id}|}'|">

                    <td th:text="${loop.index + 1}"></td>

                    <td class="col-subject"
                        th:text="${#strings.length(board.subject) > 10
                                ? #strings.substring(board.subject, 0, 10) + '...'
                                : board.subject}">
                    </td>
                    <td class="col-writer text-center"
                        th:if="${board.member?.role?.name() == 'ADMIN'
                        or board.member?.role?.name() == 'MANAGER'}">
                        운영진👑
                    </td>

                    <td class="col-writer text-center"
                        th:unless="${board.member?.role?.name() == 'ADMIN'
                        or board.member?.role?.name() == 'MANAGER'}"
                        th:text="${#strings.abbreviate(board.member?.username, 8)}">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- ============================== 자유게시판 ============================== -->

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title" onclick="location.href='/communityBoard/list'" style="cursor:pointer;">
                    🧩자유게시판
                </div>
                <a href="/communityBoard/list" class="cafe-more-btn">
                    <span class="more-text">더보기</span><span class="arrow">›</span>
                </a>
            </div>

            <div th:if="${(communityBoardList == null or communityBoardList.isEmpty()) and (subCommunityBoardNoticeList == null or subCommunityBoardNoticeList.isEmpty())}"
                 class="text-center" style="padding:40px; color:#888;">
                등록된 게시글이 없습니다.
            </div>

            <table class="cafe-board-table"
                   th:if="${(subCommunityBoardNoticeList != null and !subCommunityBoardNoticeList.isEmpty()) or (communityBoardList != null and !communityBoardList.isEmpty())}">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-writer">작성자</th>
                </tr>
                </thead>

                <!-- 📢 공지글 -->
                <tbody th:if="${subCommunityBoardNoticeList != null and !subCommunityBoardNoticeList.isEmpty()}">
                <tr class="notice-row"
                    th:each="notice : ${subCommunityBoardNoticeList}"
                    th:onclick="|location.href='@{|/communityBoard/view/${notice.id}|}'|">

                    <td class="text-danger fw-bold text-center">공지</td>

                    <td class="col-subject">
                        📢
                        <span th:text="${#strings.length(notice.subject) > 10
                            ? #strings.substring(notice.subject, 0, 10) + '...'
                            : notice.subject}">
                        </span>
                    </td>
                    <td class="col-writer text-center"
                        th:if="${notice.member?.role?.name() == 'ADMIN'
                        or notice.member?.role?.name() == 'MANAGER'}">
                        운영진👑
                    </td>

                    <td class="col-writer text-center"
                        th:unless="${notice.member?.role?.name() == 'ADMIN'
                        or notice.member?.role?.name() == 'MANAGER'}"
                        th:text="${#strings.abbreviate(notice.member?.username, 8)}">
                    </td>
                </tr>
                </tbody>

                <!-- 일반글 -->
                <tbody>
                <tr th:each="board, loop : ${communityBoardList}"
                    class="text-center"
                    th:onclick="|location.href='@{|/communityBoard/view/${board.id}|}'|">

                    <td th:text="${loop.index + 1}"></td>

                    <td class="col-subject"
                        th:text="${#strings.length(board.subject) > 10
                    ? #strings.substring(board.subject, 0, 10) + '...'
                    : board.subject}">
                    </td>
                    <td class="col-writer text-center"
                        th:if="${board.member?.role?.name() == 'ADMIN'
                        or board.member?.role?.name() == 'MANAGER'}">
                        운영진👑
                    </td>

                    <td class="col-writer text-center"
                        th:unless="${board.member?.role?.name() == 'ADMIN'
                        or board.member?.role?.name() == 'MANAGER'}"
                        th:text="${#strings.abbreviate(board.member?.username, 8)}">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>


</body>
</html>
