<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/about-bg.jpg},
               headerPosition='center center'">

<body>
<div layout:fragment="content">

    <style>
        /* ===== 전체 페이지 ===== */
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif;
            line-height: 1.6;
            font-size: 15px;
            color: #333;
            margin:0;
            padding:0;
            background:#f9f9f9;
        }

        /* ===== 페이지 컨테이너: 좌-중-우 ===== */
        .page-container {
            display:flex;
            gap:20px;
            max-width:1600px;
            margin:20px auto;
            padding:0 20px;
            overflow-x: hidden; /* 아래 스크롤 제거 */
        }

        /* ===== 좌측 사이드바 ===== */
        .sb-sidenav-menu {
            width:220px;
            background:#fff;
            border-radius:12px;
            padding:12px 0;
            flex-shrink:0;
        }
        .sb-sidenav-menu .nav {
            display:flex;
            flex-direction:column;
        }
        .sb-sidenav-menu .nav-link {
            display:flex;
            align-items:center;
            gap:10px;
            padding:10px 18px;
            margin:2px 8px;
            color:#333;
            border-radius:6px;
            text-decoration:none;
            transition:0.15s;
        }
        .sb-sidenav-menu .nav-link:hover {
            background:#f2f8ff;
            color:#1e6fd9;
        }
        .sb-sidenav-menu .nav-link.active {
            background:linear-gradient(90deg,#eaf4ff,#d6eaff);
            color:#1e6fd9;
            font-weight:600;
            position:relative;
        }
        .sb-sidenav-menu .nav-link.active::before {
            content:"";
            position:absolute;
            left:0;
            top:20%;
            width:3px;
            height:60%;
            background:#4aa8ff;
            border-radius:2px;
        }
        .sidenav-section-title {
            font-size:12px;
            color:#888;
            padding:8px 18px;
            font-weight:600;
        }
        .sb-sidenav-menu .nav-emoji {
            width:18px;
            text-align:center;
            font-size:16px;
        }

        /* ===== 중앙 콘텐츠 ===== */
        .cafe-layout {
            display:flex;
            gap:20px;
            flex:1;
        }
        .cafe-list-wrap {
           flex: 1 1 0;  /* 1 1 auto → shrink 허용 */
           min-width: 500px; /* 너무 작아지면 안 읽히니까 최소폭 500px 정도 */
        }

        .cafe-topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }
        .cafe-tabs {
            display:flex;
            gap:8px;
        }
        .tab {
            padding:6px 14px;
            border-radius:18px;
            border:1px solid #dcdcdc;
            background:#fff;
            font-size:14px;
            cursor:pointer;
            transition:0.15s;
            color:#333;
        }
        .tab.active {
            background:linear-gradient(90deg,#eaf4ff,#d6eaff);
            color:#1e6fd9;
            border-color:#cfe5ff;
            font-weight:600;
        }
        .tab:hover:not(.active) {
            background:#f2f8ff;
            color:#1e6fd9;
        }

        .cafe-list {
            display:flex;
            flex-direction:column;
            gap:12px;
        }
        .cafe-item {
            display:flex;
            gap:14px;
            padding:20px;
            background:#fff;
            border-radius:16px;
            border:1px solid #e5e5e5;
            cursor:pointer;
            transition:0.15s;
        }
        .cafe-item:hover {
            background:#f6faff;
        }
        .cafe-thumb {
            width:80px;
            height:80px;
            flex-shrink:0;
        }
        .cafe-thumb img {
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius:12px;
            border:1px solid #e5e5e5;
        }
        .cafe-content {
            flex:1;
        }
        .cafe-title {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom:6px;
        }
        .cafe-item:hover .cafe-title {
            color:#1e6fd9;
            text-decoration:underline;
        }
        .cafe-desc {
            color: #555;
            font-size: 14px;
            line-height:1.4;
            margin-bottom:6px;
        }
        .cafe-meta {
            font-size:13px;
            color:#888;
            display:flex;
            gap:12px;
        }

        /* ===== 오른쪽 카드 ===== */
        .cafe-side {
            width:260px;
            flex-shrink: 0; /* 카드 폭은 고정 */
            position:sticky;
            top:20px;
            height:max-content;
        }
        .side-card {
            background:#fff;
            border-radius:12px;
            padding:20px;
            margin-bottom:16px;
            box-shadow:0 4px 8px rgba(0,0,0,0.05);
            transition:0.15s;
        }
        .side-card:hover {
            transform:translateY(-2px);
            box-shadow:0 6px 12px rgba(0,0,0,0.08);
        }
        .side-title {
            font-size:15px;
            font-weight:600;
            margin-bottom:12px;
            color:#333;
        }
        .side-input {
            width:100%;
            padding:10px 12px;
            margin-bottom:12px;
            border:1px solid #dcdcdc;
            border-radius:8px;
            font-size:14px;
        }
        .side-input:focus {
            border-color:#1e6fd9;
            outline:none;
            box-shadow:0 0 4px rgba(30,111,217,0.3);
        }
        .login-btn {
            width:100%;
            padding:10px;
            background:#1e6fd9;
            color:#fff;
            border:none;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
        }
        .login-btn:hover {
            background:#155fc0;
        }
        .create-btn {
            width:100%;
            padding:10px;
            background:#fff;
            border:1px solid #1e6fd9;
            color:#1e6fd9;
            font-weight:600;
            border-radius:8px;
            cursor:pointer;
        }
        .create-btn:hover {
            background:#eaf4ff;
            border-color:#1c6cd9;
        }

       @media (max-width: 1000px) {
            .sb-sidenav-menu {
                display: none; /* 좌측 사이드바 숨김 */
            }
            .cafe-side {
                display: none; /* 오른쪽 카드 숨김 */
            }
            .cafe-list-wrap {
                min-width: 700px; /* 리스트 최소폭 유지 */
            }
       }
    </style>


    <div class="page-container">

        <!-- 좌측 사이드바 -->
        <nav class="sb-sidenav-menu">
            <div class="nav">
                <a class="nav-link active" href="#"><span class="nav-emoji">🏠</span>카페 홈</a>
                <a class="nav-link" href="#"><span class="nav-emoji">👥</span>이웃</a>
                <a class="nav-link" href="#"><span class="nav-emoji">⭐</span>구독</a>
                <a class="nav-link" href="#"><span class="nav-emoji">🔔</span>내 소식</a>
                <div class="sidenav-section-title">카페 탐색</div>
                <a class="nav-link sub" href="#"><span class="nav-emoji">📂</span>주제별 카페</a>
                <a class="nav-link sub" href="#"><span class="nav-emoji">📍</span>지역별 카페</a>
                <a class="nav-link sub" href="#"><span class="nav-emoji">👑</span>대표 카페</a>
                <a class="nav-link sub" href="#"><span class="nav-emoji">📈</span>카페 랭킹</a>
            </div>
        </nav>

        <!-- 중앙 콘텐츠 + 오른쪽 카드 -->
        <div class="cafe-layout">

            <!-- 중앙 카페 리스트 -->
            <div class="cafe-list-wrap">
                <h4>카페 홈</h4>

                <div class="cafe-topbar">
                    <div class="cafe-tabs">
                        <button class="tab active">내 카페</button>
                        <button class="tab">즐겨찾는 게시판</button>
                    </div>
                    <div class="cafe-manage">
                        <a href="#">⚙ 내 카페 관리</a>
                    </div>
                </div>

                <div class="cafe-list">
                    <div class="cafe-item">
                        <div class="cafe-thumb">
                            <img src="/assets/img/main.jpg" alt="헬사모">
                        </div>
                        <div class="cafe-content" th:onclick="|location.href='@{/healthCafe}'|">
                            <div class="cafe-title">헬사모</div>
                            <div class="cafe-desc">헬스를 사랑하는 사람들의 모임</div>
                            <div class="cafe-meta">
                                <span>주제 | 건강/다이어트</span>
                                <span>👤 5,325</span>
                            </div>
                        </div>
                    </div>

                    <div class="cafe-item">
                        <div class="cafe-thumb">
                            <img src="/assets/img/home-bg.jpg" alt="스터디 카페">
                        </div>
                        <div class="cafe-content" th:onclick="|location.href='@{/studyCafe}'|">
                            <div class="cafe-title">스터디 카페</div>
                            <div class="cafe-desc">문제풀이 및 공부 팁을 공유해요</div>
                            <div class="cafe-meta">
                                <span>주제 | 공부/자습</span>
                                <span>👤 743</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽 로그인/카페 만들기 -->
            <aside class="cafe-side">
                <div class="side-card">
                    <div class="side-title">로그인</div>
                    <input class="side-input" placeholder="아이디">
                    <input class="side-input" type="password" placeholder="비밀번호">
                    <button class="login-btn">로그인</button>
                </div>
                <div class="side-card">
                    <button class="create-btn">카페 만들기</button>
                </div>
            </aside>

        </div>
    </div>
</div>


</body>
</html>
