<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="showHeader=false, showSidebar=false">
<body>


<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />

    <!-- ================= 본문 시작 ================= -->

    <main class="login-page">
        <div class="write-card narrow">

            <h2 class="write-header">비밀번호 수정</h2>

            <form th:action="@{/member/passwordProc}"
                  th:object="${data}"
                  method="post"
                  novalidate>

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <!-- 현재 비밀번호 -->
                <div class="write-group">
                    <label class="write-label" for="currentPassword">
                        현재 비밀번호
                    </label>
                    <input type="password"
                           id="currentPassword"
                           class="write-title-input"
                           th:field="*{currentPassword}"
                           th:classappend="${#fields.hasErrors('currentPassword')} ? ' error'"
                           placeholder="현재 비밀번호" />

                    <div class="login-error"
                         th:if="${#fields.hasErrors('currentPassword')}"
                         th:errors="*{currentPassword}">
                    </div>
                </div>

                <!-- 새 비밀번호 -->
                <div class="write-group">
                    <label class="write-label" for="newPassword">
                        새 비밀번호
                    </label>
                    <input type="password"
                           id="newPassword"
                           class="write-title-input"
                           th:field="*{newPassword}"
                           th:classappend="${#fields.hasErrors('newPassword')} ? ' error'"
                           placeholder="새 비밀번호" />

                    <div class="login-error"
                         th:if="${#fields.hasErrors('newPassword')}"
                         th:errors="*{newPassword}">
                    </div>
                </div>

                <!-- 비밀번호 확인 -->
                <div class="write-group">
                    <label class="write-label" for="confirmPassword">
                        비밀번호 확인
                    </label>
                    <input type="password"
                           id="confirmPassword"
                           class="write-title-input"
                           th:field="*{confirmPassword}"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? ' error'"
                           placeholder="비밀번호 확인" />

                    <div class="login-error"
                         th:if="${#fields.hasErrors('confirmPassword')}"
                         th:errors="*{confirmPassword}">
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="write-action-bar">
                    <button type="submit" class="write-btn primary">
                        비밀번호 수정
                    </button>
                </div>

            </form>

        </div>
    </main>


    <!-- ================= 본문 종료 ================= -->

</div>
</body>
</html>
