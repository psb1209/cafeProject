<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="showHeader=false,
               showSidebar=false">

<body>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <main class="mb-4">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <h2>비밀번호 수정</h2>
                    <div class="my-5">
                        <form th:action="@{/member/passwordProc}" th:object="${data}" method="post" novalidate>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="form-floating mb-3">
                                <input class="form-control"
                                       th:field="*{currentPassword}"
                                       th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid'"
                                       id="currentPassword"
                                       type="password"
                                       placeholder="현재 비밀번호" />
                                <label for="currentPassword">Current password</label>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('currentPassword')}"
                                     th:errors="*{currentPassword}">
                                </div>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control"
                                       th:field="*{newPassword}"
                                       th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid'"
                                       id="newPassword"
                                       type="password"
                                       placeholder="바꿀 비밀번호" />
                                <label for="newPassword">New password</label>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('newPassword')}"
                                     th:errors="*{newPassword}">
                                </div>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control"
                                       th:field="*{confirmPassword}"
                                       th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"
                                       id="confirmPassword"
                                       type="password"
                                       placeholder="비밀번호 확인" />
                                <label for="confirmPassword">Confirm password</label>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('confirmPassword')}"
                                     th:errors="*{confirmPassword}">
                                </div>
                            </div>
                            <button class="btn btn-primary text-uppercase" type="submit">비밀번호 수정</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
