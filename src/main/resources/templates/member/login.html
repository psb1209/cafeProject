<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="showHeader=false, showSidebar=false">
<body>

<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />

    <!-- ================= 본문 시작 ================= -->

    <main class="write-page login-page narrow">
        <div class="write-card narrow">

            <div class="write-header">로그인</div>

            <div th:if="${loginError}" class="login-error">
                아이디 또는 비밀번호가 잘못되었습니다.
            </div>

            <form th:action="@{/member/login}" th:object="${data}" method="post">

                <div class="write-group">
                    <label class="write-label">ID</label>
                    <input class="write-title-input"
                           th:classappend="${loginError} ? ' error'"
                           th:field="*{username}">
                </div>

                <div class="write-group">
                    <label class="write-label">Password</label>
                    <input type="password"
                           class="write-title-input"
                           th:classappend="${loginError} ? ' error'"
                           th:field="*{password}">
                </div>

                <div class="write-action-bar">
                    <button class="write-btn primary login-btn">로그인</button>
                </div>
            </form>

            <div class="login-footer">
                <span>|</span>
                <a href="/member/create">회원가입</a>
                <span>|</span>
            </div>
        </div>
    </main>

    <!-- ================= 본문 종료 ================= -->

</div>
</body>
</html>
