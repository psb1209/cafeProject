<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="showHeader=false,
               showSidebar=false">

<body>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <main class="mb-4">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <h2>로그인</h2>
                    <div th:if="${loginError}" class="alert alert-danger">
                        아이디 또는 비밀번호가 잘못되었습니다.
                    </div>
                    <div class="my-5">
                        <form th:action="@{/member/login}" th:object="${data}" method="post" novalidate>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="form-floating mb-3">
                                <input class="form-control"
                                       th:field="*{username}"
                                       th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"
                                       id="username"
                                       type="text"
                                       placeholder="아이디" />
                                <label for="username">ID</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control"
                                       th:field="*{password}"
                                       th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"
                                       id="password"
                                       type="password"
                                       placeholder="비밀번호" />
                                <label for="password">Password</label>
                            </div>
                            <button class="btn btn-primary text-uppercase" type="submit">로그인</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
