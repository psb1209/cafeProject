<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="showHeader=false,
               showSidebar=false">
<body>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />

    <div class="write-page">
        <div class="write-card narrow">
            <div class="write-header text-danger">
                회원 탈퇴 전 꼭 확인해주세요
            </div>

            <div class="write-group">
                <p class="mb-2">
                    회원 탈퇴를 진행하면 아래 사항에 동의하는 것으로 간주됩니다.
                </p>
                <ul class="small text-muted mb-4">
                    <li>탈퇴 후에는 동일 계정으로 다시 로그인할 수 없습니다.</li>
                    <li>작성하신 게시글/댓글은 따로 삭제되지 않습니다.</li>
                    <li>일부 정보는 관련 법령에 따라 일정 기간 보관될 수 있습니다.</li>
                    <li><strong class="text-danger">탈퇴 후에는 계정 복구가 불가능합니다.</strong></li>
                </ul>
            </div>

            <form th:action="@{/member/deleteProc}"
                  th:object="${data}"
                  method="post"
                  novalidate
                  id="form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="write-group">
                    <label for="reason" class="write-label">탈퇴 사유 (선택)</label>
                    <select id="reason" th:field="*{reason}" class="write-title-input">
                        <option value="NONE">선택 안 함</option>
                        <option value="PRIVACY">개인정보/보안이 걱정돼서</option>
                        <option value="CONTENT">이용할 만한 콘텐츠가 없어서</option>
                        <option value="SERVICE">서비스/사용성이 불편해서</option>
                        <option value="ETC">기타</option>
                    </select>
                </div>

                <div class="write-group">
                    <label for="password" class="write-label">
                        현재 비밀번호 입력 <span class="text-danger">*</span>
                    </label>
                    <input type="password"
                           id="password"
                           th:field="*{password}"
                           class="write-title-input"
                           placeholder="현재 비밀번호를 입력해주세요."
                           required>
                </div>

                <div class="write-group">
                    <label class="write-label">
                        <input type="checkbox" th:field="*{confirm}" id="confirmCheck">
                        위 내용을 모두 확인했으며, 회원 탈퇴에 동의합니다.
                    </label>
                </div>

                <div class="write-action-bar">
                    <a th:href="@{/}" class="cafe-action-btn">계속 이용할래요</a>
                    <button type="submit" class="write-btn danger cafe-action-btn" id="withdrawBtn" disabled>
                        정말 탈퇴하겠습니다
                    </button>
                </div>
            </form>

            <div class="write-group small text-muted text-center mt-4">
                탈퇴 후에도 법적 보관 의무가 있는 정보는 관련 법령에 따라 보관될 수 있습니다.
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        // 체크박스 체크 시에만 탈퇴 버튼 활성화
        const confirmCheck = document.getElementById('confirmCheck');
        const withdrawBtn = document.getElementById('withdrawBtn');

        confirmCheck.addEventListener('change', function () {
            withdrawBtn.disabled = !this.checked;
        });
    </script>

</div>

</body>
</html>
