<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="showHeader=false,
               showSidebar=false">

<body>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->
    <main class="mb-4">
        <div class="container px-4 px-lg-5">
            <div class="row gx-4 gx-lg-5 justify-content-center">
                <div class="col-md-10 col-lg-8 col-xl-7">
                    <h2 th:inline="text">권한 변경 - [[${member.username}]]</h2>
                    <form th:action="@{/member/roleProc}" th:object="${data}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" th:field="*{id}"/>
                        <div class="mb-3">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select"
                                    th:field="*{role}"
                                    th:classappend="${#fields.hasErrors('role')} ? ' is-invalid'"
                                    id="role">
                                <option th:each="r : ${roles}"
                                        th:value="${r}"
                                        th:text="${r}">
                                </option>
                            </select>
                            <div class="invalid-feedback"
                                 th:if="${#fields.hasErrors('role')}"
                                 th:errors="*{role}">
                            </div>
                        </div>
                        <button class="btn btn-primary" type="submit">권한 변경</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
