<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="showHeader=false, showSidebar=false">
<body>

<h1 layout:fragment="pageTitle"
    onclick="location.href='/healthCafe'"
    style="cursor: pointer;">
    헬 사 모
</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet"/>
    <link th:href="@{/css/admin.css}" rel="stylesheet"/>

    <!-- ================= 본문 시작 ================= -->

    <main class="login-page">
        <div class="write-card narrow">

            <h2 class="write-header"
                th:inline="text">
                권한 변경 - [[${member.username}]]
            </h2>

            <form th:action="@{/member/roleProc}"
                  th:object="${data}"
                  method="post">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <input type="hidden" th:field="*{id}" />

                <!-- 글로벌 에러 -->
                <div th:if="${#fields.hasGlobalErrors()}"
                     class="login-error">
                    <span th:each="err : ${#fields.globalErrors()}"
                          th:text="${err}">
                    </span>
                </div>

                <!-- Role 선택 -->
                <div class="write-group">
                    <label for="role" class="write-label">
                        Role
                    </label>

                    <select id="role"
                            class="write-title-input"
                            th:field="*{role}"
                            th:classappend="${#fields.hasErrors('role')} ? ' error'">
                        <option th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}">
                        </option>
                    </select>

                    <div class="login-error"
                         th:if="${#fields.hasErrors('role')}"
                         th:errors="*{role}">
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="write-action-bar">
                    <button type="submit"
                            class="write-btn primary">
                        권한 변경
                    </button>
                </div>

            </form>
        </div>
    </main>

    <!-- ================= 본문 종료 ================= -->

</div>
</body>
</html>
