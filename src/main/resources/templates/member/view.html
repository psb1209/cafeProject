<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="showHeader=false,
               showSidebar=false">

<body>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />

    <!-- 카드 배경 적용 -->
    <div class="write-page medium">
        <div class="write-card medium">

            <h1 class="write-header">회원상세보기</h1>

            <div class="member-view-group">
                <label for="username" class="member-view-label">Username:</label>
                <div class="member-view-box" id="username" th:text="${data.username}"></div>
            </div>

            <div class="member-view-group">
                <label for="email" class="member-view-label">Email:</label>
                <div class="member-view-box" id="email" th:text="${data.email}"></div>
            </div>

            <div class="member-view-group">
                <label for="role" class="member-view-label">Role:</label>
                <div class="member-view-box" id="role" th:text="${data.role}"></div>
            </div>

            <div class="member-view-group">
                <label for="createDate" class="member-view-label">Create Date:</label>
                <div class="member-view-box" id="createDate" th:text="${#dates.format(data.createDate, 'yyyy-MM-dd')}"></div>
            </div>


            <!-- 버튼 영역 -->
            <div class="write-action-bar">
                <a th:href="@{/}"
                   class="cafe-action-btn">메인 페이지</a>

                <a th:href="@{/member/list}"
                   sec:authorize="hasAnyRole('MANAGER','ADMIN')"
                   class="cafe-action-btn">회원 목록</a>

                <a th:if="${canRoleUpdate == true}"
                   th:href="@{|/member/roleUpdate/${data.id}|}"
                   sec:authorize="hasAnyRole('MANAGER','ADMIN')"
                   class="cafe-action-btn">권한 수정</a>

                <a th:href="@{/member/passwordUpdate}"
                   sec:authorize="${#authentication.name == #vars.data.username}"
                   class="cafe-action-btn danger">비밀번호 변경</a>

                <a th:href="@{/member/delete}"
                   sec:authorize="${#authentication.name == #vars.data.username}"
                   class="cafe-action-btn danger">회원 탈퇴</a>
            </div>

        </div>
    </div>

    <!-- Flash Toast: 권한 변경 알림 -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
        <div id="flashToast" class="toast align-items-center border-0" role="alert"
             aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">완료!</div>
                <button type="button" class="btn-close me-2 m-auto"
                        data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
            function showFlashToast(message, isError = false) {
                const toastEl = document.getElementById("flashToast");
                if (!toastEl) return;

                const body = toastEl.querySelector(".toast-body");
                if (body) body.textContent = message;

                toastEl.classList.toggle("text-bg-danger", isError);
                toastEl.classList.toggle("text-bg-success", !isError);

                const closeBtn = toastEl.querySelector(".btn-close");
                if (closeBtn) closeBtn.classList.toggle("btn-close-white", true);

                const toast = bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 1800 });
                toast.show();
            }

            // roleProc에서 redirectAttributes.addFlashAttribute("msg", "...")로 보낸 메시지
            const flashMsg = /*[[${msg}]]*/ null;

            // bootstrap 로드까지 안전하게 기다렸다가 실행
            window.addEventListener("load", () => {
                if (flashMsg) showFlashToast(flashMsg, false);
            });
        /*]]>*/
    </script>

</div>

</body>
</html>
