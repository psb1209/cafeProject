<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="showHeader=false,
               showSidebar=false">

<body>

<div layout:fragment="content">

    <link th:href="@{/css/board.css}" rel="stylesheet" />
    <link th:href="@{/css/theme.css}" rel="stylesheet" />

    <!-- 본문 내용 시작 -->
    <main class="write-page narrow">
        <div class="write-card narrow">

            <div class="write-header">회원가입</div>

            <form th:action="@{/member/createProc}"
                  th:object="${data}"
                  method="post"
                  novalidate>

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <!-- ID -->
                <div class="write-group">
                    <label class="write-label" for="username">ID</label>
                    <input type="text"
                           id="username"
                           class="write-title-input"
                           th:field="*{username}"
                           th:classappend="${#fields.hasErrors('username')} ? ' error'" />

                    <div class="login-error"
                         th:if="${#fields.hasErrors('username')}"
                         th:errors="*{username}">
                    </div>
                </div>

                <!-- Password -->
                <div class="write-group">
                    <label class="write-label" for="password">Password</label>
                    <input type="password"
                           id="password"
                           class="write-title-input"
                           th:field="*{password}"
                           th:classappend="${#fields.hasErrors('password')} ? ' error'" />

                    <div class="login-error"
                         th:if="${#fields.hasErrors('password')}"
                         th:errors="*{password}">
                    </div>
                </div>

                <!-- Email -->
                <div class="write-group">
                    <label class="write-label" for="email">Email</label>
                    <input type="email"
                           id="email"
                           class="write-title-input"
                           th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? ' error'" />

                    <div class="login-error"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <!-- Action -->
                <div class="write-action-bar">
                    <button type="submit" class="write-btn primary">
                        회원가입
                    </button>
                </div>

            </form>
        </div>
    </main>

    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
