<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">
<body>
<h1 layout:fragment="pageTitle">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">
    <!-- 본문 내용 시작 -->

    <h2>정보게시판_수정</h2>

    <form name="DirForm" id="DirForm" th:action="@{/informationBoard/updateProc}" th:method="post">

        <!--<input type="hidden" name="_csrf" th:value="${_csrf.token}">-->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div style="display:none;">
            <input type="text" name="id" th:value="${informationBoard.id}">
        </div>

        <div class="mb-3 mt-3">
            <label for="subject">제목:</label>
            <input type="text" class="form-control" id="subject" placeholder="Enter subject" name="subject" th:value="${informationBoard.subject}">
        </div>

        <div class="mb-3">
            <label for="content">내용:</label>
            <textarea class="form-control" id="content" placeholder="Enter content" name="content" th:utext="${informationBoard.content}"></textarea>
        </div>

        <button type="button" id="btn-save" class="btn btn-secondary" onclick="save();">수정</button>
    </form>

    <script>
        function save() {
            // 간단한 클라이언트 측 유효성 검사
            if (document.DirForm.subject.value.trim() === '') {
                alert('제목을 입력해주세요');
                document.DirForm.subject.focus();
                return;
            }
            if (document.DirForm.content.value.trim() === '') {
                alert('내용을 입력해주세요');
                document.DirForm.content.focus();
                return;
            }

            if (confirm('수정하시겠습니까?')) {
                document.getElementById('DirForm').submit();
            }
        }
    </script>

    <script>
        $(document).ready(function() {
            $("#content").summernote({
                height: 300,
                lang: 'ko-KR'
            });
       });
    </script>

    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
