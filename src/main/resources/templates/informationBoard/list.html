<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg}, headerPosition='center center'">

<body>

<h1 layout:fragment="pageTitle">헬 사 모</h1>
<span layout:fragment="pageSubTitle">근육 빵빵!!</span>

<div layout:fragment="content">

    <style>
        :root {
            --blue-main: #1e6fd9;
            --blue-bg-grad: linear-gradient(90deg, #eaf4ff, #d6eaff);
            --blue-bg-soft: #f3f8ff;
            --blue-border: #cfe1ff;

            --text-main: #1f2a44;
            --text-sub: #6b7a99;
            --white: #ffffff;
        }

        .cafe-board-wrap {
            border-top: 4px solid #1e6fd9;
            background: var(--white);
            border-radius: 10px;
            padding: 28px;
            font-size: 14px;
            flex: 1;
            min-width: 0;
        }

        /* 게시판 상단 (제목 + 글쓰기 버튼) */
        .cafe-board-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--blue-main);
        }

        /* 게시판 제목 */
        .cafe-board-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        /* 글쓰기 버튼 영역 */
        .cafe-article-actions {
            display: flex;
            gap: 8px;
        }

        /* 공통 버튼 */
        .cafe-action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--blue-border);
            background: var(--white);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        /* 글쓰기 버튼 강조 */
          .cafe-action-btn.write {
            background: #e6f0ff;
            border-color: #9fc0f5;
            color: var(--blue-main);
        }

        .cafe-action-btn.write:hover {
            background: #d6e8ff;
        }

        /* ===============================
           테이블
        =============================== */
        .cafe-board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .cafe-board-table thead th {
            background: var(--blue-bg-soft);
            color: var(--text-main);
            font-weight: 600;
            font-size: 13px;
            padding: 13px 10px;
            border-bottom: 1px solid var(--blue-border);
            text-align: center;
        }

        .cafe-board-table tbody td {
            padding: 14px 10px;
            border-bottom: 1px solid #eef2f8;
            color: var(--text-main);
            text-align: center;
        }

        /* 제목 컬럼 */
        .cafe-board-table .col-subject {
            text-align: left;
            padding-left: 20px;
            font-weight: 500;
        }

        /* hover */
        .cafe-board-table tbody tr {
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .cafe-board-table tbody tr:hover {
            background: var(--blue-bg-soft);
        }

        .cafe-board-table tbody tr:hover .col-subject {
            color: var(--blue-main);
            text-decoration: underline;
        }

        /* 보조 컬럼 톤 다운 */
        .col-cnt,
        .col-date {
            color: var(--text-sub);
            font-size: 13px;
        }

                .cafe-pagination {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .page-btn {
            min-width: 34px;
            height: 34px;
            line-height: 34px;
            padding: 0 12px;
            border: 1px solid var(--blue-border);
            border-radius: 6px;
            background: var(--white);
            color: var(--text-main);
            font-size: 13px;
            text-decoration: none;
            transition: all 0.15s ease;
        }

        .page-btn:hover {
            background: var(--blue-bg-soft);
            color: var(--blue-main);
        }

        .page-btn.active {
            background: var(--blue-bg-grad);
            border-color: var(--blue-main);
            color: var(--blue-main);
            font-weight: 700;
        }

        .page-btn.disabled {
            color: var(--text-sub);
            background: #f9fbff;
            pointer-events: none;
        }

    </style>

    <div class="page-container">

        <!-- 좌측 사이드바 -->

        <nav class="sb-sidenav-menu">
            <div class="nav">

                <!-- 카페 홈 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'main'} ? ' active'"
                   th:href="@{/healthCafe}">
                    <span class="nav-emoji">🏠</span>카페 홈
                </a>

                <!-- 공지 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'noticeBoard'} ? ' active'"
                   th:href="@{/noticeBoard/list}">
                    <span class="nav-emoji">📢</span>공지사항
                </a>

                <div class="sidenav-section-title">게시판</div>

                <!-- 전체글 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'all'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">📄</span>전체글보기
                </a>

                <!-- 자유게시판 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'communityBoard'} ? ' active'"
                   th:href="@{/communityBoard/list}">
                    <span class="nav-emoji">🧩</span>자유게시판
                </a>

                <!-- 정보게시판 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'informationBoard'} ? ' active'"
                   th:href="@{/informationBoard/list}">
                    <span class="nav-emoji">🔍</span>정보게시판
                </a>

                <!-- 운영게시판 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'operationBoard'} ? ' active'"
                   th:href="@{/operationBoard/list}">
                    <span class="nav-emoji">📋</span>운영게시판
                </a>

                <!-- 사진 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'photo'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">📸</span>사진게시판
                </a>

                <!-- 질문/정보 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'qna'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">💡</span>질문/정보
                </a>

                <div class="sidenav-section-title">카페 정보</div>

                <!-- 멤버 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'members'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">👥</span>멤버
                </a>

                <!-- 소개 -->
                <a class="nav-link"
                   th:classappend="${activeMenu == 'about'} ? ' active'"
                   href="#">
                    <span class="nav-emoji">ℹ️</span>카페 소개
                </a>

            </div>
        </nav>

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title">정보 게시판</div>

                <div th:if="${msg}">
                    <span th:text="${msg}">메시지내용</span>
                </div>

                <!--사용자가 게시글의 정렬조건 선택-->
                <div class="cafe-article-actions">
                    <select onchange="location.href='?page=0&sort=' + this.value" class="cafe-action-btn write">
                        <option value="createDate,desc" th:selected="${param.sort != null and param.sort[0] == 'createDate,desc'}" class="cafe-action-btn write">최근 등록일 순</option>
                        <option value="createDate,asc" th:selected="${param.sort != null and param.sort[0] == 'createDate,asc'}" class="cafe-action-btn write">오래된 순</option>
                        <option value="cnt,desc" th:selected="${param.sort != null and param.sort[0] == 'cnt,desc'}" class="cafe-action-btn write">조회수 높은 순</option>
                        <option value="cnt,asc" th:selected="${param.sort != null and param.sort[0] == 'cnt,asc'}" class="cafe-action-btn write">조회수 낮은 순</option>
                    </select>

                    <!--사용자에게 목록에 보여질 갯수 선택-->
                    <select onchange="location.href='?page=0&size=' + this.value" class="cafe-action-btn write">
                        <option value="5" th:selected="${informationBoardList.size == 5}" class="cafe-action-btn write">5개씩 보기</option>
                        <option value="10" th:selected="${informationBoardList.size == 10}" class="cafe-action-btn write">10개씩 보기</option>
                        <option value="15" th:selected="${informationBoardList.size == 15}" class="cafe-action-btn write">15개씩 보기</option>
                        <option value="20" th:selected="${informationBoardList.size == 20}" class="cafe-action-btn write">20개씩 보기</option>
                    </select>

                    <a th:href="@{/informationBoard/create}"
                       class="cafe-action-btn write">
                        ✏️ 게시글 작성
                    </a>
                </div>
            </div>

            <table class="cafe-board-table">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject">제목</th>
                    <th class="col-cnt">조회수</th>
                    <th class="col-writer">작성자</th>
                    <th class="col-writer">회원등급</th>
                    <th class="col-date">작성일</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="informationBoard, loop : ${informationBoardList}"
                    th:onclick="|location.href='@{|/informationBoard/view/${informationBoard.id}|}'|"
                    style="cursor: pointer;">
                    <td th:text="${loop.index+1}"></td>
                    <td class="col-subject" th:text="${informationBoard.subject}"></td>
                    <td th:text="${informationBoard.cnt}"></td>
                    <td th:text="${informationBoard.member.username}"></td>
                    <td th:switch="${informationBoard.member.grade.name()}">
                        <span th:case="'USER'">일반🥉</span>
                        <span th:case="'REGULAR'">성실🥈</span>
                        <span th:case="'BEST'">우수🥇</span>
                        <span th:case="'SPECIAL'">최우수🏆</span></td>
                    <td th:text="${#dates.format(informationBoard.createDate, 'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>
            </table>

            <!-- 페이지네이션 -->
            <div class="cafe-pagination" th:if="${!informationBoardList.isEmpty()}">

                <span class="page-btn disabled"
                      th:if="${informationBoardList.first}">이전</span>

                <a class="page-btn"
                   th:if="${!informationBoardList.first}"
                   th:href="@{|?page=${informationBoardList.number-1}|}">
                    이전
                </a>

                <span th:each="page : ${#numbers.sequence(0, informationBoardList.totalPages-1)}"
                      th:text="${page + 1}"
                      class="page-btn"
                      th:classappend="${page == informationBoardList.number} ? ' active'"
                      th:if="${page == informationBoardList.number}">
                </span>

                <a th:each="page : ${#numbers.sequence(0, informationBoardList.totalPages-1)}"
                   th:if="${page != informationBoardList.number}"
                   th:text="${page + 1}"
                   class="page-btn"
                   th:href="@{|?page=${page}|}">
                </a>

                <span class="page-btn disabled"
                      th:if="${informationBoardList.last}">다음</span>

                <a class="page-btn"
                   th:if="${!informationBoardList.last}"
                   th:href="@{|?page=${informationBoardList.number+1}|}">
                    다음
                </a>
            </div>
        </div>
    </div>
</div>

<script th:if="${informationBoardList.isEmpty()}">
    alert([[${errMsg}]]);
</script>

</body>
</html>
