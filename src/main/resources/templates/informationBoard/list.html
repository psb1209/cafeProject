<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center',
               sidebarKey='cafe'">

<body>

<h1 layout:fragment="pageTitle" onclick="location.href='/healthCafe'" style="cursor: pointer;">헬 사 모</h1>
<span layout:fragment="pageSubTitle">다 같이 길러보아요 근육!</span>

<div layout:fragment="content">
    <link th:href="@{/css/board.css}" rel="stylesheet" />

    <div class="page-container">

        <div class="cafe-board-wrap">
            <div class="cafe-board-header">
                <div class="cafe-board-title">정보 게시판</div>

                <div th:if="${msg}">
                    <span th:text="${msg}">메시지내용</span>
                </div>

                <script>
                    // 현재 URL에서 파라미터 가져오기
                    const params = new URLSearchParams(window.location.search);

                    const keyword = params.get("sort");
                    const page = params.get("page");

                    console.log(keyword); // 예: "카페"
                    console.log(page);    // 예: "2"

                    const param = keyword ? keyword.split(",") : [];
                    console.log(param);
                </script>

                <!--사용자가 게시글의 정렬조건 선택-->
                <div class="cafe-article-actions">
                    <select onchange="location.href='?page=0&sort=' + this.value" class="cafe-action-btn write">
                        <option value="createDate,desc" th:selected="${param.sort != null and param.sort[0] == 'createDate,desc'}" class="cafe-action-btn write">최근 등록일 순</option>
                        <option value="createDate,asc" th:selected="${param.sort != null and param.sort[0] == 'createDate,asc'}" class="cafe-action-btn write">오래된 순</option>
                        <option value="cnt,desc" th:selected="${param.sort != null and param.sort[0] == 'cnt,desc'}" class="cafe-action-btn write">조회수 높은 순</option>
                        <option value="cnt,asc" th:selected="${param.sort != null and param.sort[0] == 'cnt,asc'}" class="cafe-action-btn write">조회수 낮은 순</option>
                    </select>

                    <!--사용자에게 목록에 보여질 갯수 선택-->
                    <select onchange="location.href='?page=0&size=' + this.value" class="cafe-action-btn write">
                        <option value="5" th:selected="${informationBoardList.size == 5}" class="cafe-action-btn write">5개씩 보기</option>
                        <option value="10" th:selected="${informationBoardList.size == 10}" class="cafe-action-btn write">10개씩 보기</option>
                        <option value="15" th:selected="${informationBoardList.size == 15}" class="cafe-action-btn write">15개씩 보기</option>
                        <option value="20" th:selected="${informationBoardList.size == 20}" class="cafe-action-btn write">20개씩 보기</option>
                    </select>

                    <a th:href="@{/informationBoard/create}"
                       class="cafe-action-btn write">
                        ✏️ 게시글 작성
                    </a>
                </div>
            </div>

            <div class="cafe-board-search">
                <form method="get"
                      th:action="@{/informationBoard/list}"
                      class="cafe-search-form">
                    <input type="search"
                           name="keyword"
                           placeholder="게시판 검색"
                           th:value="${keyword}">
                    <input type="hidden" name="size" value="15" th:selected="${informationBoardList.size == 15}">
                    <button type="submit">🔍</button>
                </form>
            </div>

            <div th:if="${(informationBoardList == null or informationBoardList.isEmpty()) and (subNoticeList == null or subNoticeList.isEmpty())}"
                 class="text-center" style="padding:40px; color:#888;">
                등록된 게시글이 없습니다.
            </div>

            <table class="cafe-board-table"
                   th:if="${(subNoticeList != null and !subNoticeList.isEmpty()) or (informationBoardList != null and !informationBoardList.isEmpty())}">
                <thead>
                <tr>
                    <th class="col-no">순번</th>
                    <th class="col-subject text-center">제목</th>
                    <th class="col-cnt">조회수</th>
                    <th class="col-writer">작성자</th>
                    <th class="col-writer">회원등급</th>
                    <th class="col-date">작성일</th>
                </tr>
                </thead>

                <!-- 📢 공지글 영역 -->
                <tbody th:if="${subNoticeList != null and !subNoticeList.isEmpty() and informationBoardList.number == 0}">

                <!--====================================================== 검색 기능 변경사항!! =======================================================-->
                <!--
                        th:if="${#strings.isEmpty(keyword) or #strings.containsIgnoreCase(subNotice.subject, keyword)}" = 공지글을 화면에 보여줄지 말지 결정하는 조건

                        #strings.isEmpty(keyword) = 검색어(keyword)가 없으면 공지글을 보여준다
                        #strings.containsIgnoreCase(subNotice.subject, keyword) = 검색어가 있으면 공지글 제목에 그 검색어가 들어 있을 때만 보여준다
                -->
                <tr class="notice-row"
                    th:each="subNotice : ${subNoticeList}"
                    th:if="${#strings.isEmpty(keyword) or #strings.containsIgnoreCase(subNotice.subject, keyword)}"
                    th:onclick="|location.href='@{|/informationBoard/view/${subNotice.id}|}'|">
                    <!--====================================================== 검색 기능 변경사항!! =======================================================-->
                    <!-- 순번 대신 공지 -->
                    <td class="text-danger fw-bold text-center">공지</td>

                    <td>
                        📢 <span th:text="${subNotice.subject}"></span>
                        <!--고정 공지 게시글 제목 옆 댓글수 표시-->
                        <span class="text-danger small ms-2"
                              th:if="${#lists.size(subNotice.commentList) > 0}"
                              th:text="|[${#lists.size(subNotice.commentList)}]|">
                        </span>

                        <form th:if="${#authorization.expression('hasAnyRole(''ROLE_ADMIN'',''ROLE_MANAGER'')')}"
                              th:action="@{/informationBoard/toggleNotice/{id}(id=${subNotice.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="notice-btn">공지해제</button>
                        </form>
                    </td>

                    <!-- 조회수 -->
                    <td class="td_underline" th:text="${viewCntMap[subNotice.id]}"></td>

                    <!-- 작성자 -->
                    <td class="td_underline" th:text="${subNotice.member.username}"></td>

                    <!-- 등급 -->
                    <td class="td_underline text-center">운영진👑</td>

                    <!-- 날짜 -->
                    <td class="td_underline text-center"
                        th:text="${#dates.format(subNotice.createDate, 'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>

                <tbody>
                <tr th:each="informationBoard, loop : ${informationBoardList}"
                    th:if="${!informationBoard.subNotice}"
                    th:onclick="|location.href='@{|/informationBoard/view/${informationBoard.id}|}'|">


                    <td class="td_underline"
                        th:text="${informationBoardList.number * informationBoardList.size + loop.index + 1}"></td>
                    <td>
                        <span th:text="${informationBoard.subject}" class="col-subject" style="text-align: left;"></span>
                            <!--게시글 제목 옆 댓글수 표시-->
                            <span class="text-danger small ms-2"
                                  th:if="${#lists.size(informationBoard.commentList) > 0}"
                                  th:text="|[${#lists.size(informationBoard.commentList)}]|">
                            </span>

                        <!--====================================================== 공지글!! =======================================================-->
                        <!-- 관리자/매니저만 -->
                        <form th:if="${#authorization.expression('hasAnyRole(''ROLE_ADMIN'',''ROLE_MANAGER'')')}"
                              th:action="@{/informationBoard/toggleNotice/{id}(id=${informationBoard.id})}" method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="notice-btn">공지등록</button>
                        </form>
                        <!--====================================================== 공지글!! =======================================================-->

                    </td>
                    <td class="td_underline" th:text="${viewCntMap[informationBoard.id]}"></td>
                    <td class="td_underline" th:text="${informationBoard.member.username}"></td>
<!--                    <td class="td_underline text-center" th:switch="${informationBoard.member.grade.name()}">-->
<!--                        <span th:case="'USER'">일반🥉</span>-->
<!--                        <span th:case="'REGULAR'">성실🥈</span>-->
<!--                        <span th:case="'BEST'">우수🥇</span>-->
<!--                        <span th:case="'SPECIAL'">최우수🏆</span>-->
<!--                    </td>-->

                    <td class="td_underline text-center">
                    <span th:if="${informationBoard.member.role.name() == 'ADMIN' or informationBoard.member.role.name() == 'MANAGER'}">운영진👑</span>
                        <th:block th:unless="${informationBoard.member.role.name() == 'ADMIN' or informationBoard.member.role.name() == 'MANAGER'}">
                            <div th:switch="${informationBoard.member.grade.name()}" th:remove="tag">
                                <span th:case="'USER'">일반🥉</span>
                                <span th:case="'REGULAR'">성실🥈</span>
                                <span th:case="'BEST'">우수🥇</span>
                                <span th:case="'SPECIAL'">최우수🏆</span>
                            </div>
                        </th:block>
                    </td>

                    <td class="td_underline text-center"
                        th:text="${#dates.format(informationBoard.createDate, 'yyyy-MM-dd')}"></td>
                </tr>
                </tbody>
            </table>


            <!-- 게시글 페이징 -->
            <div class="cafe-pagination" th:if="${!informationBoardList.isEmpty()}">

                <!-- 이전 버튼 -->
                <a class="page-btn"
                   th:classappend="${informationBoardList.first} ? ' disabled'"
                   th:href="@{|/informationBoard/list?page=${informationBoardList.number - 1}|}">이전</a>

                <!-- 페이지 번호 버튼: 현재 페이지 기준 +-2 -->
                <th:block th:with="
                            startPage=${informationBoardList.number - 2 > 0 ? informationBoardList.number - 2 : 0},
                            endPage=${informationBoardList.number + 2 < informationBoardList.totalPages - 1 ? informationBoardList.number + 2 : informationBoardList.totalPages - 1}">

                    <a class="page-btn"
                       th:each="page : ${#numbers.sequence(startPage, endPage)}"
                       th:text="${page + 1}"
                       th:classappend="${page == informationBoardList.number} ? ' active'"
                       th:href="@{|/informationBoard/list?page=${page}|}"></a>
                </th:block>

                <!-- 다음 버튼 -->
                <a class="page-btn"
                   th:classappend="${informationBoardList.last} ? ' disabled'"
                   th:href="@{|/informationBoard/list?page=${informationBoardList.number + 1}|}">다음</a>
            </div>
        </div>
    </div>
</div>
</div>

<script th:if="${informationBoardList != null and informationBoardList.isEmpty()}">
    alert([[${errMsg}]]);
</script>

</body>
</html>
