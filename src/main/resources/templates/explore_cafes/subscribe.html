<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/about-bg.jpg},
               headerPosition='center center'">

<body>
<div layout:fragment="content">
    <link th:href="@{/css/theme.css}" rel="stylesheet" />

    <div class="page-container">

        <!-- 중앙 콘텐츠 + 오른쪽 카드 -->
        <div class="cafe-layout">

            <div class="cafe-list-wrap subscribe-wrap">
                <h4>구독</h4>
                <!-- 상단 탭 -->
                <div class="cafe-topbar">
                    <div class="cafe-tabs">
                        <button class="tab active">구독</button>
                        <button class="tab">인기</button>
                        <button class="tab">전체</button>
                    </div>
                </div>

                <!-- 구독 피드 -->
                <div class="subscribe-feed">

                    <!-- 카페 카드 -->
                    <section class="subscribe-card">
                        <div class="card-header">
                            <div class="cafe-icon"></div>
                            <div class="cafe-info">
                                <div class="cafe-name">여행을 사랑하는 사람들</div>
                                <div class="cafe-meta">회원수 12,345 · 여행</div>
                            </div>
                            <button class="subscribe-btn on">구독중</button>
                        </div>

                        <ul class="post-list">
                            <li>
                                <span class="post-title">제주도 3박 4일 일정 공유합니다</span>
                                <span class="post-time">· 2시간 전</span>
                            </li>
                            <li>
                                <span class="post-title">혼자 여행하기 좋은 국내 여행지</span>
                                <span class="post-time">· 어제</span>
                            </li>
                            <li>
                                <span class="post-title">겨울에 가기 좋은 해외 여행지 추천</span>
                                <span class="post-time">· 2일 전</span>
                            </li>
                        </ul>

                        <div class="card-footer">카페 바로가기 ></div>
                    </section>

                    <section class="subscribe-card">
                        <div class="card-header">
                            <div class="cafe-icon dev"></div>
                            <div class="cafe-info">
                                <div class="cafe-name">개발자 카페</div>
                                <div class="cafe-meta">회원수 98,210 · IT/개발</div>
                            </div>
                            <button class="subscribe-btn on">구독중</button>
                        </div>

                        <ul class="post-list">
                            <li>
                                <span class="post-title">Spring Boot 실무 구조 정리</span>
                                <span class="post-time">· 1시간 전</span>
                            </li>
                            <li>
                                <span class="post-title">요즘 많이 쓰는 프론트 스택</span>
                                <span class="post-time">· 오늘</span>
                            </li>
                            <li>
                                <span class="post-title">주니어 개발자 로드맵</span>
                                <span class="post-time">· 3일 전</span>
                            </li>
                        </ul>

                        <div class="card-footer">카페 바로가기 ></div>
                    </section>

                </div>
            </div>

            <!-- 오른쪽 로그인/카페 만들기 -->
            <aside class="cafe-side">
                <!-- 로그인 카드 -->
                <div class="side-card">
<!--                    <div class="side-title">로그인</div>
                    <input class="side-input" placeholder="아이디">
                    <input class="side-input" type="password" placeholder="비밀번호">-->
                    <button class="login-btn" th:onclick="|location.href='@{/member/login}'|">로그인</button>

                    <!-- ===== 로그인 하단 링크 ===== -->
                    <div class="login-footer">
                        <span>|</span>
                        <a href="/signup">회원가입</a>
                        <span>|</span>
<!--                        <a href="/find-id">아이디 찾기</a>
                        <span>|</span>
                        <a href="/find-password">비밀번호 찾기</a>-->
                    </div>
                </div>
                <div class="side-card">
                    <button class="create-btn">말고 다른거</button>
                </div>
            </aside>

        </div>
    </div>

    <script>
        function toggleSide() {
            document.querySelector('.page-container')
                .classList.toggle('folded');
        }
    </script>

</div>

</body>
</html>
