<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/about-bg.jpg},
               headerPosition='center center'">

<body>
<div layout:fragment="content">
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
    <div class="page-container">

        <div class="cafe-layout">

            <!-- 중앙 카페 리스트 -->
            <div class="cafe-list-wrap" id="cafeList" th:fragment="cafeList">

                <h4>대표 카페</h4>

                <div class="cafe-topbar">
                    <div class="cafe-tabs">
                        <button class="tab active">건강 · 다이어트</button>
                        <button class="tab">IT · 개발</button>
                        <button class="tab">여행</button>
                    </div>
                </div>

                <div class="cafe-list">

                    <section>
                        <h5 class="cafe-category-title">건강 · 다이어트</h5>

                        <!-- 1 -->
                        <div class="cafe-item" onclick="location.href='/healthCafe'">
                            <div class="cafe-thumb">
                                <img src="/assets/img/main.jpg" alt="헬사모">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">헬사모</div>
                                <div class="cafe-desc">헬스를 사랑하는 사람들의 모임</div>
                                <div class="cafe-meta">
                                    <span>👤 5325</span>
                                </div>
                            </div>
                        </div>

                        <!-- 2 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health1.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">다이어트 연구소</div>
                                <div class="cafe-desc">체계적인 감량 & 식단 공유</div>
                                <div class="cafe-meta">
                                    <span>👤 543</span>
                                </div>
                            </div>
                        </div>

                        <!-- 3 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health2.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">홈트의 정석</div>
                                <div class="cafe-desc">집에서 하는 운동 루틴 모음</div>
                                <div class="cafe-meta">
                                    <span>👤 658</span>
                                </div>
                            </div>
                        </div>

                        <!-- 4 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health3.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">헬린이 탈출기</div>
                                <div class="cafe-desc">운동 초보를 위한 가이드</div>
                                <div class="cafe-meta">
                                    <span>👤 1521</span>
                                </div>
                            </div>
                        </div>

                        <!-- 5 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health4.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">근육 키우는 사람들</div>
                                <div class="cafe-desc">벌크업 · 근비대 정보 공유</div>
                                <div class="cafe-meta">
                                    <span>👤 356</span>
                                </div>
                            </div>
                        </div>

                        <!-- 6 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health5.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">바디프로필 준비반</div>
                                <div class="cafe-desc">바프 준비 식단 & 운동</div>
                                <div class="cafe-meta">
                                    <span>👤 856</span>
                                </div>
                            </div>
                        </div>

                        <!-- 7 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health6.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">건강한 식단 연구소</div>
                                <div class="cafe-desc">영양 · 식단 · 레시피 공유</div>
                                <div class="cafe-meta">
                                    <span>👤 654</span>
                                </div>
                            </div>
                        </div>

                        <!-- 8 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health7.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">체력단련 클럽</div>
                                <div class="cafe-desc">기초 체력부터 근력까지</div>
                                <div class="cafe-meta">
                                    <span>👤 352</span>
                                </div>
                            </div>
                        </div>

                        <!-- 9 -->
                        <div class="cafe-item" style="margin-top: 20px;">
                            <div class="cafe-thumb">
                                <img src="/assets/img/health8.png">
                            </div>
                            <div class="cafe-content">
                                <div class="cafe-title">운동일기 공유방</div>
                                <div class="cafe-desc">오늘의 운동 기록</div>
                                <div class="cafe-meta">
                                    <span>👤 332</span>
                                </div>
                            </div>
                        </div>

                    </section>
                </div>
            </div>

            <!-- 오른쪽 로그인/카페 만들기 -->
            <aside class="cafe-side">
                <!-- 로그인 카드 -->
                <div class="side-card">
                    <!--                    <div class="side-title">로그인</div>
                                        <input class="side-input" placeholder="아이디">
                                        <input class="side-input" type="password" placeholder="비밀번호">-->
                    <button class="login-btn" th:onclick="|location.href='@{/member/login}'|">로그인</button>

                    <!-- ===== 로그인 하단 링크 ===== -->
                    <div class="login-footer">
                        <span>|</span>
                        <a href="/member/create">회원가입</a>
                        <span>|</span>
                        <!--                        <a href="/find-id">아이디 찾기</a>
                                                <span>|</span>
                                                <a href="/find-password">비밀번호 찾기</a>-->
                    </div>
                </div>
                <div class="side-card">
                    <button class="create-btn" onclick="location.href='/boardManagement/create'">카페 만들기</button>
                </div>
            </aside>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function toggleSide() {
            document.querySelector('.page-container')
                .classList.toggle('folded');
        }
    </script>

    <script>
        function loadFavoriteCafe() {
          $.get("/explore_cafes/favorite", function (html) {
            $("#cafeList").replaceWith(html);
          });
        }

        function loadMyCafe() {
          $.get("/explore_cafes/my", function (html) {
            $("#cafeList").replaceWith(html);
          });
        }

        function setActive(btn) {
            $(".tab").removeClass("active");
            $(btn).addClass("active");
        }
    </script>


</div>

</body>
</html>
