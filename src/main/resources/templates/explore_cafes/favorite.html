<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

<div class="cafe-list-wrap" id="cafeList" th:fragment="cafeList">
    <h4>카페 홈</h4>

    <div class="cafe-topbar">
        <div class="cafe-tabs">
            <button class="tab" type="button" onclick="loadMyCafe()"
                    th:classappend="${activeTab == 'my'} ? ' active'">내 카페</button>

            <button class="tab" type="button" onclick="loadFavoriteCafe()"
                    th:classappend="${activeTab == 'favorite'} ? ' active'">즐겨찾는 카페</button>
        </div>
        <div class="cafe-manage">
            <a href="#">⚙ 내 카페 관리</a>
        </div>
    </div>

    <div class="cafe-item">
        <div class="cafe-thumb">
            <img src="/assets/img/main.jpg" alt="헬사모">
        </div>
        <div class="cafe-content" onclick="location.href='/healthCafe'">
            <div class="cafe-title">헬사모</div>
            <div class="cafe-desc">헬스를 사랑하는 사람들의 모임</div>
            <div class="cafe-meta">
                <span>주제 | 건강/다이어트</span>
                <span>👤 5,325</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
