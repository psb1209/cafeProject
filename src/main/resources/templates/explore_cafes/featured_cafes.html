<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/about-bg.jpg},
               headerPosition='center center'">

<body>
<div layout:fragment="content">
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
    <div class="page-container">

        <div class="cafe-layout">

            <!-- 중앙 카페 리스트 -->
            <div class="cafe-list-wrap" id="cafeList" th:fragment="cafeList">

                <h4>카페 랭킹</h4>

                <!--<div class="cafe-topbar">
                    <div class="cafe-tabs">
                        <button class="tab" type="button"
                                onclick="loadMyCafe()"
                                th:classappend="${activeTab == 'my'} ? ' active'">내 카페</button>

                        <button class="tab" type="button"
                                onclick="loadFavoriteCafe()"
                                th:classappend="${activeTab == 'favorite'} ? ' active'">즐겨찾는 카페</button>
                    </div>
                </div>-->

                <div class="cafe-list">

                    <!-- 1위 -->
                    <div class="cafe-item">
                        <div class="cafe-thumb" style="position:relative;">
                            <img src="/assets/img/main.jpg" alt="헬사모">
                            <span style="
                                position:absolute;
                                top:6px;
                                left:6px;
                                font-size:18px;
                                line-height:1;
                            ">
                                🥇
                            </span>
                        </div>

                        <div class="cafe-content" th:onclick="|location.href='@{/healthCafe}'|">
                            <div class="cafe-title">헬사모</div>
                            <div class="cafe-desc">헬스를 사랑하는 사람들의 모임</div>
                            <div class="cafe-meta">
                                <span>주제 | 건강/다이어트</span>
                                <span>👤 5,325</span>
                            </div>
                        </div>
                    </div>

                    <!-- 2위 -->
                    <div class="cafe-item">
                        <div class="cafe-thumb" style="position:relative;">
                            <img src="/assets/img/coding.png" alt="코딩하는 사람들">
                            <span style="
                                position:absolute;
                                top:6px;
                                left:6px;
                                font-size:18px;
                                line-height:1;
                            ">
                                🥈
                            </span>
                        </div>
                        <div class="cafe-content">
                            <div class="cafe-title">코딩하는 사람들</div>
                            <div class="cafe-desc">개발자들의 정보 공유 공간</div>
                            <div class="cafe-meta">
                                <span>주제 | IT/개발</span>
                                <span>👤 4,120</span>
                            </div>
                        </div>
                    </div>

                    <!-- 3위 -->
                    <div class="cafe-item">
                        <div class="cafe-thumb" style="position:relative;">
                            <img src="/assets/img/soloEat.png" alt="혼밥러 모임">
                            <span style="
                                position:absolute;
                                top:6px;
                                left:6px;
                                font-size:18px;
                                line-height:1;
                            ">
                                🥉
                            </span>
                        </div>
                        <div class="cafe-content">
                            <div class="cafe-title">혼밥러 모임</div>
                            <div class="cafe-desc">혼자 밥 먹는 사람들의 이야기</div>
                            <div class="cafe-meta">
                                <span>주제 | 일상/라이프</span>
                                <span>👤 3,987</span>
                            </div>
                        </div>
                    </div>
                    <!-- 4위 -->
                    <div class="cafe-item">
                        <div class="cafe-thumb" style="position:relative;">
                            <img src="/assets/img/GlobalTravel.png" alt="여행에 미치다">

                            <span style="
            position:absolute;
            top:6px;
            left:6px;
            min-width:22px;
            height:22px;
            padding:0 6px;
            border-radius:11px;
            background:var(--blue-bg-soft);
            border:1px solid var(--blue-border);
            color:var(--blue-main);
            font-size:12px;
            font-weight:600;
            display:flex;
            align-items:center;
            justify-content:center;
        ">4</span>
                        </div>

                        <div class="cafe-content">
                            <div class="cafe-title">여행에 미치다</div>
                            <div class="cafe-desc">국내·해외 여행 정보 공유</div>
                            <div class="cafe-meta">
                                <span>주제 | 여행</span>
                                <span>👤 3,210</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 오른쪽 로그인/카페 만들기 -->
            <aside class="cafe-side">
                <!-- 로그인 카드 -->
                <div class="side-card">
                    <!--                    <div class="side-title">로그인</div>
                                        <input class="side-input" placeholder="아이디">
                                        <input class="side-input" type="password" placeholder="비밀번호">-->
                    <button class="login-btn" th:onclick="|location.href='@{/member/login}'|">로그인</button>

                    <!-- ===== 로그인 하단 링크 ===== -->
                    <div class="login-footer">
                        <span>|</span>
                        <a href="/member/create">회원가입</a>
                        <span>|</span>
                        <!--                        <a href="/find-id">아이디 찾기</a>
                                                <span>|</span>
                                                <a href="/find-password">비밀번호 찾기</a>-->
                    </div>
                </div>
                <div class="side-card">
                    <button class="create-btn" onclick="location.href='/boardManagement/create'">카페 만들기</button>
                </div>
            </aside>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function toggleSide() {
            document.querySelector('.page-container')
                .classList.toggle('folded');
        }
    </script>

    <script>
        function loadFavoriteCafe() {
          $.get("/explore_cafes/favorite", function (html) {
            $("#cafeList").replaceWith(html);
          });
        }

        function loadMyCafe() {
          $.get("/explore_cafes/my", function (html) {
            $("#cafeList").replaceWith(html);
          });
        }

        function setActive(btn) {
            $(".tab").removeClass("active");
            $(btn).addClass("active");
        }
    </script>


</div>

</body>
</html>
