<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{main_layout/layout}"
      th:with="headerImage=@{/assets/img/about-bg.jpg},
               headerPosition='center center'">

<body>
<div layout:fragment="content">
    <link th:href="@{/css/theme.css}" rel="stylesheet" />
    <div class="page-container">

        <!-- 좌측 사이드바 -->

        <nav class="sb-sidenav-menu">
            <div class="nav">

                <a class="nav-link"
                   th:classappend="${activeMenu == 'main'} ? ' active'"
                   href="/">
                    <span class="nav-emoji">🏠</span>카페 홈
                </a>

                <a class="nav-link" href="/explore_cafes/neighbor">
                    <span class="nav-emoji">👥</span>이웃
                </a>

                <a class="nav-link"
                   th:classappend="${activeMenu == 'subscribe'} ? ' active'"
                   href="/explore_cafes/subscribe">
                    <span class="nav-emoji">⭐</span>구독
                </a>

                <a class="nav-link"
                   th:classappend="${activeMenu == 'notice'} ? ' active'"
                   href="/explore_cafes/notice">
                    <span class="nav-emoji">🔔</span>내 소식
                </a>

                <div class="sidenav-section-title">카페 탐색</div>

                <a class="nav-link"
                   th:classappend="${activeMenu == 'THEMED'} ? ' active'"
                   href="/explore_cafes/themed_cafes">
                    <span class="nav-emoji">📂</span>주제별 카페
                </a>

                <a class="nav-link"
                   th:classappend="${activeMenu == 'LOCATION'} ? ' active'"
                   href="/explore_cafes/cafes_by_location">
                    <span class="nav-emoji">📍</span>지역별 카페
                </a>

                <a class="nav-link"
                   th:classappend="${activeMenu == 'TOP'} ? ' active'"
                   href="/explore_cafes/top_cafes">
                    <span class="nav-emoji">👑</span>대표 카페
                </a>

                <a class="nav-link"
                   th:classappend="${activeMenu == 'FEATURED'} ? ' active'"
                   href="/explore_cafes/featured_cafes">
                    <span class="nav-emoji">📈</span>카페 랭킹
                </a>

            </div>
        </nav>

        <!-- 중앙 콘텐츠 + 오른쪽 카드 -->
        <div class="cafe-layout">

            <!-- 중앙 카페 리스트 -->
            <div class="cafe-list-wrap" id="cafeList">
                <h4>주제별 카페</h4>

                <div class="cafe-topbar">
                    <div class="cafe-tabs">
                        <button class="tab active" onclick="loadMyCafe(this)">내 카페</button>
                        <button class="tab" onclick="loadFavoriteCafe(this)">즐겨찾는 카페</button>
                    </div>
                    <div class="cafe-manage">
                        <a href="#">⚙ 내 카페 관리</a>
                    </div>
                </div>

                <div class="cafe-list">
                    <div class="cafe-item">
                        <div class="cafe-thumb">
                            <img src="/assets/img/main.jpg" alt="헬사모">
                        </div>
                        <div class="cafe-content" th:onclick="|location.href='@{/healthCafe}'|">
                            <div class="cafe-title">헬사모</div>
                            <div class="cafe-desc">헬스를 사랑하는 사람들의 모임</div>
                            <div class="cafe-meta">
                                <span>주제 | 건강/다이어트</span>
                                <span>👤 5,325</span>
                            </div>
                        </div>
                    </div>

                    <div class="cafe-item">
                        <div class="cafe-thumb">
                            <img src="/assets/img/home-bg.jpg" alt="스터디 카페">
                        </div>
                        <div class="cafe-content" th:onclick="|location.href='@{/studyCafe}'|">
                            <div class="cafe-title">스터디 카페</div>
                            <div class="cafe-desc">문제풀이 및 공부 팁을 공유해요</div>
                            <div class="cafe-meta">
                                <span>주제 | 공부/자습</span>
                                <span>👤 743</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽 로그인/카페 만들기 -->
            <aside class="cafe-side">
                <!-- 로그인 카드 -->
                <div class="side-card">
                    <!--                    <div class="side-title">로그인</div>
                                        <input class="side-input" placeholder="아이디">
                                        <input class="side-input" type="password" placeholder="비밀번호">-->
                    <button class="login-btn" th:onclick="|location.href='@{/member/login}'|">로그인</button>

                    <!-- ===== 로그인 하단 링크 ===== -->
                    <div class="login-footer">
                        <span>|</span>
                        <a href="/member/create">회원가입</a>
                        <span>|</span>
                        <!--                        <a href="/find-id">아이디 찾기</a>
                                                <span>|</span>
                                                <a href="/find-password">비밀번호 찾기</a>-->
                    </div>
                </div>
                <div class="side-card">
                    <button class="create-btn">카페 만들기</button>
                </div>
            </aside>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function toggleSide() {
            document.querySelector('.page-container')
                .classList.toggle('folded');
        }
    </script>

    <script>
        function loadFavoriteCafe(btn) {
            $.get("/explore_cafes/favorite", function(html) {
                $("#cafeList").html(html);
                setActive(btn);
            });
        }

        function loadMyCafe(btn) {
            $.get("/explore_cafes/my", function(html) {
                $("#cafeList").html(html);
                setActive(btn);
            });
        }

        function setActive(btn) {
            $(".tab").removeClass("active");
            $(btn).addClass("active");
        }

    </script>


</div>

</body>
</html>
