<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="~{_layout/layout}"
      th:with="headerImage=@{/assets/img/main.jpg},
               headerPosition='center center'">

<body>

<h1 layout:fragment="pageTitle">헬 사 모</h1>
<span layout:fragment="pageSubTitle">헬스를 사랑하는 사람들의 모임</span>

<div layout:fragment="content">
    <div class="container">
    <!-- 본문 내용 시작 -->
    <h1>글 수정하기</h1>
        <form name="DirForm" id="DirForm" th:action="@{/noticeBoard/updateProc}" th:method="post">
            <!--        <input type="text" name="_csrf" th:value="${_csrf.token}">-->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div style="display: none;">
                <input type="text" name="id" th:value="${noticeBoard.id}">
            </div>

            <div class="mb-3">
                <label for="subject">제목:</label>
                <input type="text" class="form-control" id="subject" name="subject" th:value="${noticeBoard.subject}">
            </div>
            <div class="mb-3">
                <label for="content">내용:</label>
                <textarea class="form-control" rows="5" id="content" name="content" th:text="${noticeBoard.content}"></textarea>
            </div>
        </form>
        <button id="btn-save" class="btn btn-secondary" type="button" onclick="save();">수정하기</button>

        <script>
            function save() {
            if (document.DirForm.subject.value.trim() === '') {
                alert('제목을 입력해주세요.');
                document.DirForm.subject.focus();
                return;
            }
            if (document.DirForm.content.value.trim() === '') {
                alert('내용을 입력해주세요.');
                document.DirForm.content.focus();
                return;
            }
            if (confirm('수정 하시겠습니까?')) {
                document.getElementById('DirForm').submit();
            }
           }
        </script>
        <script>
            $(document).ready(function() {


                // CSRF META 태그에서 값 읽기
                let header = $("meta[name='_csrf_header']").attr("content");
                let token = $("meta[name='_csrf']").attr("content");

                // 모든 AJAX 요청마다 CSRF 자동 추가
                $.ajaxSetup({
                    beforeSend: function(xhr) {
                        xhr.setRequestHeader(header, token);
                    }
                });



                $("#content").summernote({
                    height: 300,
                    // (선택적) Summernote 설정 보완
                    lang: 'ko-KR', // 언어 설정
                    placeholder: '여기에 내용을 작성하세요...',
                    toolbar: [
                        ['style', ['style']],
                        ['font', ['bold', 'italic', 'underline', 'clear']],
                        ['para', ['ul', 'ol', 'paragraph']],
                        ['insert', ['link', 'picture']]
                    ],
                    callbacks: {
                        onImageUpload: function(files) {
                            uploadSummernoteImageFile(files[0], this);
                        }
                    }
                });
            });

            function uploadSummernoteImageFile(file, editor) {
                let data = new FormData();
                data.append("file", file);

                $.ajax({
                    url: "/noticeBoard/uploadImage",   // 업로드 URL
                    type: "POST",
                    enctype: 'multipart/form-data',
                    data: data,
                    processData: false,
                    contentType: false,
                    success: function (response) {
                        // 업로드된 이미지 URL을 에디터에 삽입
                        $(editor).summernote('insertImage', response.url);
                    },
                    error: function() {
                        alert("이미지 업로드 실패");
                    }
                });
            }
        </script>
    </div>
    <!-- 본문 내용 종료 -->
</div>

</body>
</html>
